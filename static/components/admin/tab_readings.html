<!-- «Реестр показаний» — отдельная вкладка (вынесено из дашборда 2026-06-09).
     Единый реестр всех показаний MeterReading из ВСЕХ источников (QR-портал,
     приложение, Google Sheets, авто) с фильтрами/анализаторами и утверждением.
     Гугл-матчер (буфер сопоставления строк Google Sheets) — отдельно, в
     «Операции → Центр анализа». Модуль readings.js. -->
<div id="readings" class="tab-content">
    <div class="card" style="margin: 0;">
        <div class="card-header" style="flex-direction:column; align-items:stretch; gap:14px;">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;">
                <h3 style="margin:0;"><i class="fa-solid fa-chart-line" style="color:var(--primary-color); margin-right:8px;"></i> Реестр показаний</h3>
                <div class="header-controls" style="gap:6px;">
                    <div class="compact-upload">
                        <input type="file" id="importReadingsFile" accept=".xlsx, .xls">
                        <button id="btnImportReadings" class="action-btn secondary-btn" style="height: 30px; font-size: 12px; padding: 0 10px;">
                            <i class="fa-solid fa-file-arrow-down"></i> Загрузить Excel
                        </button>
                    </div>
                    <button id="btnBulkApprove" class="action-btn success-btn">
                        <i class="fa-solid fa-check-double"></i> Утвердить безопасные
                    </button>
                    <button id="btnRefreshReadings" class="icon-btn" title="Обновить таблицу">
                        <i class="fa-solid fa-rotate-right"></i>
                    </button>
                </div>
            </div>

            <div id="readingsKPIs" style="display:flex; flex-wrap:wrap; gap:8px;">
                <div style="padding:8px 12px; color:var(--text-secondary);">
                    <i class="fa-solid fa-spinner fa-spin"></i> Загрузка аналитики…
                </div>
            </div>

            <div class="toolbar-controls" style="gap:8px; flex-wrap:wrap;">
                <select id="readingsFilterPeriod" title="Период" style="min-width:160px;">
                    <option value="">Активный период</option>
                </select>
                <select id="readingsFilterRisk" title="Уровень риска" style="min-width:140px;">
                    <option value="">Все риски</option>
                    <option value="clean">🟢 Чистые (&lt;30)</option>
                    <option value="suspicious">🟡 Подозрительные (30-80)</option>
                    <option value="critical">🔴 Критичные (≥80)</option>
                </select>
                <select id="readingsFilterSource" title="Источник подачи" style="min-width:150px;">
                    <option value="">Все источники</option>
                    <option value="user">📱 Приложение</option>
                    <option value="gsheets">📊 Google Sheets</option>
                    <option value="auto">🤖 Авто-генерация</option>
                    <option value="one_time">💰 Одноразовый</option>
                    <option value="meter_replace">🔧 Замена счётчика</option>
                </select>
                <select id="readingsFilterFlag" title="Тип флага" style="min-width:170px;">
                    <option value="">Все флаги</option>
                </select>
                <label style="display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text-secondary); white-space:nowrap;">
                    <input type="checkbox" id="filterAnomalies">Только аномалии
                </label>
                <input type="text" id="readingsSearch" placeholder="Поиск по ФИО / комнате…" style="flex:1; min-width:180px;">
            </div>
        </div>

        <div class="table-responsive">
            <table class="sticky-header-table">
                <thead>
                    <tr>
                        <th style="width:28px;"></th>
                        <th data-reading-sort="username" class="sortable">Жилец / Объект</th>
                        <th data-reading-sort="anomaly_score" class="sortable">Статус / Риск</th>
                        <th>Источник</th>
                        <th class="text-right">ГВС (м³)</th>
                        <th class="text-right">ХВС (м³)</th>
                        <th class="text-right">Свет (кВт)</th>
                        <th class="text-right">Δ vs прошл.</th>
                        <th data-reading-sort="total_cost" class="sortable text-right">Сумма (₽)</th>
                        <th class="text-center">Действия</th>
                    </tr>
                </thead>
                <tbody id="readingsTableBody">
                    <tr>
                        <td colspan="10" class="text-center" style="padding: 40px;">
                            <i class="fa-solid fa-spinner fa-spin text-primary"></i> Загрузка данных...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="modal-footer" style="background: transparent; border: none; padding: 16px 0 0 0;">
            <div class="pagination">
                <button id="btnPrev" class="page-btn"><i class="fa-solid fa-chevron-left"></i> Назад</button>
                <span id="pageIndicator" style="font-size: 13px; font-weight: 500; color: var(--text-secondary);">Стр. 1</span>
                <button id="btnNext" class="page-btn">Вперед <i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>
