<div id="tariffs" class="tab-content">

    <!-- ========================================= -->
    <!-- НОВЫЙ БЛОК: НАСТРОЙКА ГРАФИКА             -->
    <!-- ========================================= -->
    <div class="card" style="border-left: 5px solid #3b82f6; margin-bottom: 20px;">
        <div class="card-header">
            <h3>📅 График подачи показаний</h3>
        </div>
        <div style="display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap;">
            <div class="form-group">
                <label>День начала (включительно)</label>
                <input type="number" id="setStartDay" min="1" max="28" style="width: 150px;" placeholder="Например: 20">
            </div>
            <div class="form-group">
                <label>День окончания (включительно)</label>
                <input type="number" id="setEndDay" min="1" max="28" style="width: 150px;" placeholder="Например: 25">
            </div>
            <button id="btnSaveSchedule" class="action-btn primary-btn">Сохранить график</button>
        </div>
        <p class="hint-text" style="margin-top: 10px;">
            * Система будет <b>автоматически</b> открывать период в день начала и закрывать его на следующий день после окончания. Числа от 1 до 28.
        </p>
    </div>

    <!-- ========================================= -->
    <!-- СТАРЫЙ БЛОК: НАСТРОЙКА ТАРИФОВ            -->
    <!-- ========================================= -->
    <div class="card">
        <div class="card-header" style="flex-direction: column; align-items: flex-start; gap: 15px;">
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; flex-wrap: wrap; gap: 10px;">
                <div>
                    <h3>🛠 Настройка профилей тарификации</h3>
                    <span class="hint-text">Создавайте разные тарифы для разных общежитий или организаций</span>
                </div>
                <button id="btnCreateNewTariff" class="action-btn primary-btn">➕ Создать профиль</button>
            </div>

            <!-- Выбор тарифа для редактирования -->
            <div style="display: flex; gap: 10px; align-items: center; background: #eff6ff; padding: 10px 15px; border-radius: 8px; width: 100%; flex-wrap: wrap;">
                <label style="font-weight: 600; color: #1e40af;">Редактировать тариф:</label>
                <select id="tariffSelector" style="width: 300px; padding: 8px;"></select>
                <button id="btnDeleteTariff" class="action-btn danger-btn" style="padding: 8px 12px; display: none;">Удалить</button>
            </div>
        </div>

        <form id="tariffsForm" class="tariffs-grid">
            <input type="hidden" id="t_id">

            <div class="tariff-item highlight" style="grid-column: 1 / -1;">
                <label>Название профиля (например: ЦСООР Лидер)</label>
                <input type="text" id="t_name" required>
            </div>

            <div class="tariff-item">
                <label>Содержание и ремонт (м²)</label>
                <input type="number" step="0.01" id="t_main" required>
            </div>
            <div class="tariff-item">
                <label>Наем жилья (м²)</label>
                <input type="number" step="0.01" id="t_rent" required>
            </div>
            <div class="tariff-item">
                <label>ТКО / Мусор (чел)</label>
                <input type="number" step="0.01" id="t_waste" required>
            </div>
            <div class="tariff-item">
                <label>Отопление (м²)</label>
                <input type="number" step="0.01" id="t_heat" required>
            </div>
            <div class="tariff-item highlight">
                <label>🔥 Подогрев ГВС (м³)</label>
                <input type="number" step="0.01" id="t_w_heat" required>
            </div>
            <div class="tariff-item highlight">
                <label>💧 Подача воды (м³)</label>
                <input type="number" step="0.01" id="t_w_sup" required>
            </div>
            <div class="tariff-item highlight">
                <label>🚽 Водоотведение (м³)</label>
                <input type="number" step="0.01" id="t_sew" required>
            </div>
            <div class="tariff-item highlight">
                <label>⚡ Эл. Энергия (кВт)</label>
                <input type="number" step="0.01" id="t_el_rate" required>
            </div>
            <div class="tariff-item">
                <label>Эл. энергия ОДН (м²)</label>
                <input type="number" step="0.01" id="t_el_sqm" required>
            </div>

            <div class="tariff-actions">
                <button type="submit" class="action-btn success-btn large-btn">Сохранить изменения профиля</button>
            </div>
        </form>
    </div>
</div>
