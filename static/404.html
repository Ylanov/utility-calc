<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2563eb">
    <!-- Сама страница ошибки не должна индексироваться. -->
    <meta name="robots" content="noindex, follow">
    <title>Страница не найдена — ЖКХ Лидер</title>
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="apple-touch-icon" href="/icons/icon.svg">
    <style>
        :root {
            --blue: #2563eb;
            --slate-900: #0f172a;
            --slate-600: #475569;
            --slate-100: #f1f5f9;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Inter", Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #eff6ff 0%, #f8fafc 100%);
            color: var(--slate-900);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100%;
            padding: 24px;
            -webkit-font-smoothing: antialiased;
        }
        @media (prefers-color-scheme: dark) {
            body { background: #0b1220; color: #e2e8f0; }
            .sub { color: #94a3b8 !important; }
        }
        .card {
            text-align: center;
            max-width: 460px;
            width: 100%;
        }
        .code {
            font-size: clamp(72px, 22vw, 132px);
            font-weight: 800;
            line-height: 1;
            color: var(--blue);
            letter-spacing: -2px;
        }
        h1 {
            margin-top: 8px;
            font-size: clamp(20px, 6vw, 26px);
            font-weight: 700;
        }
        .sub {
            margin-top: 12px;
            font-size: 15px;
            line-height: 1.5;
            color: var(--slate-600);
        }
        .btn {
            display: inline-block;
            margin-top: 28px;
            padding: 13px 28px;
            background: var(--blue);
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            transition: transform .15s ease, box-shadow .15s ease;
            box-shadow: 0 6px 18px rgba(37, 99, 235, .28);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(37, 99, 235, .34); }
        .brand { margin-top: 36px; font-size: 13px; color: #94a3b8; }
    </style>
</head>
<body>
    <main class="card">
        <div class="code">404</div>
        <h1>Страница не найдена</h1>
        <p class="sub">
            Возможно, ссылка устарела или содержит ошибку.
            Проверьте адрес или вернитесь на главную.
        </p>
        <a class="btn" href="/">На главную</a>
        <p class="brand">ЖКХ Лидер · asy-tk.ru</p>
    </main>
</body>
</html>
