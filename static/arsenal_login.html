<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — СТРОБ.Арсенал</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-sm fade-in">
    <!-- Логотип -->
    <div class="text-center mb-8">
        <div class="w-16 h-16 bg-blue-700 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-900/50">
            <i class="fa-solid fa-shield-halved text-white text-2xl"></i>
        </div>
        <h1 class="text-2xl font-black text-white tracking-wide uppercase">СТРОБ.Арсенал</h1>
        <p class="text-slate-400 text-sm mt-1">Система номерного учёта ВВСТ</p>
    </div>

    <!-- Карточка входа -->
    <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700/50 p-8">
        <div id="errorMsg" class="hidden mb-5 bg-rose-900/50 border border-rose-700/50 text-rose-300 text-sm px-4 py-3 rounded-xl flex items-center gap-3">
            <i class="fa-solid fa-circle-exclamation text-rose-400 shrink-0"></i>
            <span id="errorText">Ошибка</span>
        </div>

        <form id="arsenalLoginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Имя пользователя</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-3 text-slate-500 text-sm"></i>
                    <input type="text" id="username" placeholder="Введите логин" required autocomplete="username"
                        class="w-full bg-slate-700 border border-slate-600 text-white placeholder-slate-500 rounded-xl pl-9 pr-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>
            </div>
            <div>
                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1.5">Пароль</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-3 text-slate-500 text-sm"></i>
                    <input type="password" id="password" placeholder="Введите пароль" required autocomplete="current-password"
                        class="w-full bg-slate-700 border border-slate-600 text-white placeholder-slate-500 rounded-xl pl-9 pr-4 py-2.5 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                </div>
            </div>
            <button type="submit" id="loginBtn"
                class="w-full bg-blue-700 hover:bg-blue-600 text-white font-bold py-2.5 rounded-xl transition shadow-sm flex items-center justify-center gap-2 mt-2">
                <i class="fa-solid fa-right-to-bracket"></i>
                <span id="loginBtnText">Войти в систему</span>
            </button>
        </form>
    </div>

    <div class="text-center mt-5">
        <a href="portal.html" class="text-slate-500 hover:text-slate-300 text-sm transition">
            <i class="fa-solid fa-arrow-left mr-1.5"></i> Вернуться на портал
        </a>
    </div>
</div>

<script>
document.getElementById('arsenalLoginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const userInp = document.getElementById('username');
    const passInp = document.getElementById('password');
    const btn = document.getElementById('loginBtn');
    const btnText = document.getElementById('loginBtnText');
    const errDiv = document.getElementById('errorMsg');
    const errText = document.getElementById('errorText');

    errDiv.classList.add('hidden');
    btn.disabled = true;
    btnText.textContent = 'Вход...';
    btn.querySelector('i').className = 'fa-solid fa-spinner fa-spin';

    try {
        const formData = new URLSearchParams();
        formData.append('username', userInp.value);
        formData.append('password', passInp.value);

        const response = await fetch('/api/arsenal/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: formData
        });

        if (response.ok) {
            const data = await response.json();
            sessionStorage.setItem('access_token', data.access_token);
            sessionStorage.setItem('arsenal_role', data.role);
            sessionStorage.setItem('arsenal_username', userInp.value);
            window.location.href = data.redirect_url || 'arsenal_dashboard.html';
        } else {
            const errorData = await response.json().catch(() => ({}));
            errText.textContent = errorData.detail || 'Неверное имя пользователя или пароль';
            errDiv.classList.remove('hidden');
            btn.disabled = false;
            btnText.textContent = 'Войти в систему';
            btn.querySelector('i').className = 'fa-solid fa-right-to-bracket';
        }
    } catch (error) {
        errText.textContent = 'Ошибка подключения к серверу';
        errDiv.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Войти в систему';
        btn.querySelector('i').className = 'fa-solid fa-right-to-bracket';
    }
});
</script>
</body>
</html>
