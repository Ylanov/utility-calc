<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="UTF-8">
    <!--
        PWA mobile-first портал жильца — `https://asy-tk.ru/app/`.
        Параллельно с десктопным `static/index.html` (старый портал не трогаем).
        Manifest + Service Worker → жилец может «добавить на главный экран»
        и пользоваться как обычным приложением (даже офлайн с кэшем).
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ЖКХ Лидер">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">

    <title>ЖКХ Лидер</title>

    <link rel="manifest" href="/app/manifest.webmanifest">
    <link rel="apple-touch-icon" href="/app/icons/icon-192.png">
    <link rel="icon" type="image/svg+xml" href="/app/icons/icon.svg">

    <link rel="stylesheet" href="/app/css/main.css">
    <link rel="stylesheet" href="/app/css/components.css">
</head>
<body>
    <!--
        App-shell: статичный каркас который грузится моментально.
        Содержимое <main id="app"></main> рендерится JS-screen'ами.
        Bottom-nav фиксируется снизу — touch-friendly.
    -->
    <div id="splash" class="splash" aria-hidden="false">
        <div class="splash__logo">ЖКХ</div>
        <div class="splash__pulse"></div>
    </div>

    <main id="app" class="app" aria-busy="true">
        <!-- Screen рендерится JS — см. /app/js/screens/*.js -->
    </main>

    <nav id="bottom-nav" class="bottom-nav hidden" aria-label="Главная навигация">
        <a href="#/home" class="bottom-nav__item" data-route="home" aria-label="Главная">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M3 12L12 3l9 9M5 10v10h14V10"/>
            </svg>
            <span>Главная</span>
        </a>
        <a href="#/readings" class="bottom-nav__item" data-route="readings" aria-label="Показания">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="12" r="9"/>
                <path d="M12 7v5l3 2"/>
            </svg>
            <span>Подать</span>
        </a>
        <a href="#/history" class="bottom-nav__item" data-route="history" aria-label="История">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="3" y="4" width="18" height="16" rx="2"/>
                <path d="M7 9h10M7 13h7M7 17h4"/>
            </svg>
            <span>История</span>
        </a>
        <a href="#/profile" class="bottom-nav__item" data-route="profile" aria-label="Профиль">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 4-6 8-6s8 2 8 6"/>
            </svg>
            <span>Профиль</span>
        </a>
    </nav>

    <!-- Toast container (рендерится JS) -->
    <div id="toast-host" class="toast-host" role="status" aria-live="polite"></div>

    <!-- Entry point. CSP-friendly: только external scripts (см. nginx aleks CSP). -->
    <script type="module" src="/app/js/main.js"></script>
    <!-- Юридический футер + cookie-баннер (152-ФЗ). Лежит на /js/ старого
         портала, путь работает за счёт того что весь /static/ доступен через корень. -->
    <script src="/js/legal-footer.js" defer></script>
</body>
</html>
