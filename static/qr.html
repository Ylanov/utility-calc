<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Подача показаний</title>
    <link rel="icon" href="/app/icons/icon.svg">
    <style>
        :root { --pri:#2563eb; --ok:#16a34a; --warn:#b45309; --err:#dc2626; --bg:#f1f5f9; --card:#fff; --text:#1f2937; --muted:#6b7280; }
        * { box-sizing: border-box; }
        body { margin:0; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; background:var(--bg); color:var(--text); -webkit-text-size-adjust:100%; }
        .wrap { max-width: 480px; margin: 0 auto; padding: 16px; min-height: 100vh; display:flex; flex-direction:column; }
        .card { background:var(--card); border-radius:14px; padding:20px; box-shadow:0 1px 3px rgba(0,0,0,.08); margin-bottom:14px; }
        h1 { font-size:20px; margin:0 0 4px; }
        .sub { color:var(--muted); font-size:13px; margin:0 0 8px; }
        .meter { margin:18px 0; }
        .meter-label { font-weight:600; font-size:15px; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
        .digits { display:flex; align-items:center; gap:8px; }
        .digits input { font-size:26px; text-align:center; border:2px solid #cbd5e1; border-radius:10px; padding:10px 6px; width:100%; font-variant-numeric:tabular-nums; }
        .digits .black input { letter-spacing:3px; }
        .digits .red input { border-color:#fca5a5; background:#fef2f2; color:var(--err); }
        .digits .dot { font-size:28px; font-weight:700; color:var(--muted); }
        .cap { font-size:11px; color:var(--muted); text-align:center; margin-top:4px; }
        .blk { flex: 0 0 62%; } .rd { flex: 0 0 30%; }
        button { width:100%; font-size:17px; font-weight:600; border:none; border-radius:12px; padding:15px; cursor:pointer; }
        .primary { background:var(--pri); color:#fff; }
        .ghost { background:#e2e8f0; color:var(--text); margin-top:10px; }
        .primary:disabled { opacity:.5; }
        .banner { border-radius:12px; padding:16px; margin-bottom:14px; font-size:15px; line-height:1.5; }
        .b-ok { background:#dcfce7; color:#166534; }
        .b-warn { background:#fef3c7; color:#92400e; }
        .b-err { background:#fee2e2; color:#991b1b; }
        .center { text-align:center; }
        .spin { display:inline-block; width:36px; height:36px; border:4px solid #cbd5e1; border-top-color:var(--pri); border-radius:50%; animation:r 0.8s linear infinite; }
        @keyframes r { to { transform: rotate(360deg); } }
        .hint { font-size:13px; color:var(--muted); background:#f8fafc; border-left:3px solid var(--pri); padding:8px 12px; border-radius:6px; margin:10px 0; }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="app" class="center" style="padding-top:80px;"><span class="spin"></span></div>
    </div>
    <script src="/qr-portal.js"></script>
</body>
</html>
