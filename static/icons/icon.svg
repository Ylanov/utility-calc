<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
    <!--
        Логотип-плейсхолдер ЖКХ Лидер. Минималистичный: домик с галочкой.
        Используется в PWA manifest + favicon + Splash на iOS.
        Цвет — фирменный синий (#2563eb), подстраивается под темы через
        background_color manifest.
    -->
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#2563eb"/>
        </linearGradient>
    </defs>
    <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>
    <!-- Дом -->
    <path d="M256 128 L384 224 L384 384 L304 384 L304 304 L208 304 L208 384 L128 384 L128 224 Z"
          fill="none" stroke="#fff" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Капля воды (символ ЖКХ — вода/коммуналка) -->
    <circle cx="368" cy="160" r="32" fill="#fff" opacity="0.95"/>
    <path d="M368 142 Q380 158 380 168 Q380 178 368 178 Q356 178 356 168 Q356 158 368 142 Z"
          fill="#2563eb"/>
</svg>
