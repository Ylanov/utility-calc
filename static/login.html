<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a73e8">
    <title>Вход для сотрудников | ЖКХ Лидер</title>

    <!-- SEO -->
    <meta name="description" content="Служебный вход для сотрудников ЖКХ Лидер. Жильцы подают показания по QR-коду в квартире.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://asy-tk.ru/login.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Вход для сотрудников — ЖКХ Лидер">
    <meta property="og:description" content="Служебный вход. Жильцы подают показания по QR-коду в квартире.">
    <meta property="og:url" content="https://asy-tk.ru/login.html">
    <meta property="og:locale" content="ru_RU">

    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
    <link rel="apple-touch-icon" href="/icons/icon.svg">

    <!-- Локальные ассеты (без CDN — cdnjs/Google Fonts тормозят/блочат в РФ).
         Шрифт — системный стек (см. CSS), FontAwesome локально. -->
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- Предзагрузка скрипта авторизации -->
    <link rel="modulepreload" href="js/login.js">
</head>
<body class="portal-body" style="position: relative;">

    <!-- Кнопка Назад на портал -->
    <a href="portal.html" style="position: absolute; top: 24px; left: 24px; color: var(--text-secondary); font-weight: 500; display: flex; align-items: center; gap: 8px; transition: color 0.2s;">
        <i class="fa-solid fa-arrow-left"></i> На главную
    </a>

    <!-- Контейнер для тостов (уведомлений) -->
    <div id="toast-container"></div>

    <form id="loginForm" class="styled-form">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="font-size: 40px; color: var(--primary-color); margin-bottom: 16px;"><i class="fa-solid fa-building-user"></i></div>
            <h1 style="margin: 0; font-size: 24px; color: var(--text-main);">Вход в систему</h1>
            <p style="margin: 8px 0 0 0; color: var(--text-secondary); font-size: 14px;">ЖКХ Лидер</p>
        </div>

        <div class="form-group mb-3">
            <label for="username">Логин</label>
            <input type="text" id="username" required autocomplete="username" placeholder="Ваш логин">
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label for="password">Пароль</label>
            <input type="password" id="password" required autocomplete="current-password" placeholder="Ваш пароль">
        </div>

        <button type="submit" id="btnLogin" class="action-btn primary-btn full-width" style="padding: 12px; font-size: 15px;">Войти</button>

        <p style="text-align:center; margin-top:14px; font-size:11.5px; color:var(--text-secondary); line-height:1.5;">
            Входя в систему, вы соглашаетесь с
            <a href="/privacy.html" style="text-decoration:underline;">Политикой обработки ПДн</a>
            и <a href="/consent.html" style="text-decoration:underline;">Согласием на обработку ПДн</a>.
        </p>

    </form>

    <script type="module" src="js/login.js"></script>
    <!-- Юридический футер + cookie-баннер. Стандартная обвязка по 152-ФЗ. -->
    <script src="js/legal-footer.js" defer></script>
</body>
</html>
