<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a73e8">
    <title>Вход в личный кабинет жильца | ЖКХ Лидер</title>

    <!-- SEO -->
    <meta name="description" content="Вход в личный кабинет жильца. Подавайте показания счётчиков, скачивайте квитанции, заказывайте справки.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://asy-tk.ru/login.html">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Вход в личный кабинет — ЖКХ Лидер">
    <meta property="og:description" content="Войдите по логину и паролю чтобы подать показания и оплатить ЖКХ.">
    <meta property="og:url" content="https://asy-tk.ru/login.html">
    <meta property="og:locale" content="ru_RU">

    <link rel="icon" type="image/svg+xml" href="/app/icons/icon.svg">
    <link rel="apple-touch-icon" href="/app/icons/icon.svg">

    <!-- Быстрая загрузка шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Иконки и стили -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <!-- Предзагрузка скрипта авторизации -->
    <link rel="modulepreload" href="js/login.js">
</head>
<body class="portal-body" style="position: relative;">

    <!-- Кнопка Назад на портал -->
    <a href="portal.html" style="position: absolute; top: 24px; left: 24px; color: var(--text-secondary); font-weight: 500; display: flex; align-items: center; gap: 8px; transition: color 0.2s;">
        <i class="fa-solid fa-arrow-left"></i> Назад к платформам
    </a>

    <!-- Контейнер для тостов (уведомлений) -->
    <div id="toast-container"></div>

    <form id="loginForm" class="styled-form">
        <div style="text-align: center; margin-bottom: 32px;">
            <div style="font-size: 40px; color: var(--primary-color); margin-bottom: 16px;"><i class="fa-solid fa-building-user"></i></div>
            <h1 style="margin: 0; font-size: 24px; color: var(--text-main);">Вход в систему</h1>
            <p style="margin: 8px 0 0 0; color: var(--text-secondary); font-size: 14px;">ЖКХ Лидер</p>
        </div>

        <div class="form-group mb-3">
            <label for="username">Логин</label>
            <input type="text" id="username" required autocomplete="username" placeholder="Ваш логин">
        </div>

        <div class="form-group" style="margin-bottom: 24px;">
            <label for="password">Пароль</label>
            <input type="password" id="password" required autocomplete="current-password" placeholder="Ваш пароль">
        </div>

        <button type="submit" id="btnLogin" class="action-btn primary-btn full-width" style="padding: 12px; font-size: 15px;">Войти</button>

        <div style="text-align: center; margin-top: 24px;">
            <a href="#" id="btnForgotPass" style="font-size: 13px; font-weight: 500;">Забыли пароль?</a>
        </div>
    </form>

    <!-- ИНФО-МОДАЛКА «Забыли пароль?»
         Раньше тут была форма с полем «площадь помещения» как контрольным
         вопросом. Площадь — слабый knowledge factor (соседи / бывшие жильцы
         её знают), и сам endpoint только регистрировал заявку, ничего не
         сбрасывая. Удалено в may 2026: жилец теперь просто видит текст
         «обратитесь в бухгалтерию», без формы и без обращений к серверу. -->
    <div id="resetModal" class="modal-overlay">
        <div class="modal-window" style="width: 450px;">
            <div class="modal-header">
                <h3>Восстановление доступа</h3>
                <button type="button" class="close-icon" id="btnCloseIconReset">&times;</button>
            </div>
            <div class="modal-form" style="padding-top: 16px;">
                <div style="background: var(--primary-bg); border-left: 4px solid var(--primary-color); padding: 20px; border-radius: var(--radius-sm); margin-bottom: 24px;">
                    <p style="margin: 0 0 12px 0; font-size: 14px; font-weight: 600; color: var(--text-main);">Сброс пароля выполняет бухгалтерия</p>
                    <p style="margin: 0; font-size: 13px; color: var(--text-secondary); line-height: 1.6;">
                        Для получения нового пароля свяжитесь с бухгалтерией —
                        сотрудник выдаст временный пароль лично или по телефону.
                        Самостоятельный сброс через сайт отключён в целях безопасности.
                    </p>
                </div>
                <button type="button" id="btnCloseSuccess" class="action-btn primary-btn full-width" style="padding: 12px;">Понятно</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/login.js"></script>
    <!-- Юридический футер + cookie-баннер. Стандартная обвязка по 152-ФЗ. -->
    <script src="js/legal-footer.js" defer></script>
</body>
</html>
