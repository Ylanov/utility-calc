# nginx/conf.d/common_proxy.conf
#
# Общие настройки проксирования, таймаутов, лимитов и gzip.
# Включается в server-блоки через: include /etc/nginx/conf.d/common_proxy.conf;
#
# Используется в:
#   - default.conf  →  server { server_name localhost 127.0.0.1; }
#
# Примечание: HTTPS-блок (server_name asy-tk.ru) содержит эти настройки
# напрямую (без include), потому что туда добавляются HSTS и CSP которые
# нельзя ставить на HTTP. Этот файл — версия без HTTPS-специфичных заголовков.

# ================================
# ТАЙМАУТЫ ПРОКСИРОВАНИЯ
# ================================
proxy_connect_timeout 5s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Если один бекенд упал — пробуем следующий
proxy_next_upstream       error timeout http_502 http_503 http_504;
proxy_next_upstream_tries 5;

# ================================
# ЛИМИТЫ ЗАПРОСОВ
# ================================
client_max_body_size    10M;
client_body_buffer_size 16k;

client_body_timeout   10s;
client_header_timeout 10s;
send_timeout          10s;

keepalive_timeout   65s;
keepalive_requests  2000;

# ================================
# БАЗОВЫЕ ЗАГОЛОВКИ БЕЗОПАСНОСТИ
# (только те, что безопасны для HTTP)
# HSTS намеренно отсутствует — он только для HTTPS.
# CSP намеренно отсутствует — на localhost не нужен.
# ================================
add_header X-Frame-Options       "SAMEORIGIN"                    always;
add_header X-Content-Type-Options "nosniff"                      always;
add_header X-XSS-Protection      "1; mode=block"                 always;
add_header Referrer-Policy       "strict-origin-when-cross-origin" always;
add_header Permissions-Policy    "geolocation=(), microphone=(), camera=()" always;

# ================================
# GZIP
# ================================
gzip              on;
gzip_disable      "msie6";
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   6;
gzip_min_length   256;
gzip_buffers      16 8k;
gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    application/xml
    image/svg+xml;