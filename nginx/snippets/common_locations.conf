# nginx/conf.d/common_locations.conf
#
# Общие location-блоки: статика, health, API-роутинг, SPA.
# Включается через: include /etc/nginx/conf.d/common_locations.conf;
#
# Используется в:
#   - default.conf  →  server { server_name localhost 127.0.0.1; }
#
# Этот файл содержит те же location-блоки что и HTTPS production-блок,
# за двумя отличиями:
#   1. /docs, /openapi.json — НЕ заблокированы
#      (localhost-блок доступен только с самого VPS, Swagger нужен для дебага)
#   2. Rate limiting применяется — защита от случайных петель внутри Docker

# ================================
# СТАТИЧЕСКИЕ ФАЙЛЫ
# ================================
# Раньше всё было `expires 30d` + `Cache-Control: immutable`. Без cache-busting
# в URL это приводило к багу деплоя: после push в GitHub → Tailscale → сервер
# файлы обновлялись, но браузеры пользователей 30 дней игнорировали изменения
# (immutable отключает revalidation даже на Ctrl+F5). Теперь:
#   - JS/CSS — короткий TTL (1 час), чтобы релиз был виден сразу
#   - шрифты/иконки/картинки — 30 дней (контент стабилен), без immutable —
#     браузер сделает If-Modified-Since и получит 304 если файл не менялся
location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|webp)$ {
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
    try_files $uri =404;
}

location ~* \.(css|js)$ {
    expires 1h;
    add_header Cache-Control "public, must-revalidate";
    access_log off;
    try_files $uri =404;
}

# ================================
# СГЕНЕРИРОВАННЫЕ ФАЙЛЫ (квитанции)
# ================================
location /static/generated_files/ {
    alias /usr/share/nginx/html/static/generated_files/;
    autoindex off;
    expires 7d;
    add_header Cache-Control "public";
    access_log off;
}

# ================================
# HEALTHCHECK
# ================================
location = /health {
    proxy_pass http://jkh_backend/health;
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    access_log off;
}

# ================================
# БЛОКИРОВКА СКРЫТЫХ ФАЙЛОВ
# ================================
location ~ /\.(?!well-known).* {
    deny all;
}

location ~* /(wp-admin|wp-login|phpmyadmin|mysql|\.env) {
    return 444;
}

# Swagger / Metrics — на localhost НЕ блокируем:
# этот server-блок доступен только с самого VPS (localhost 127.0.0.1),
# а не из интернета, поэтому Swagger безопасно оставить открытым для отладки.
# Nginx-блок для asy-tk.ru (HTTPS) блокирует их сам.

# ================================
# LOGIN (с rate limiting)
# ================================
location = /api/token {
    limit_req zone=login_limit burst=10 nodelay;
    proxy_pass http://jkh_backend;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/arsenal/login {
    limit_req zone=login_limit burst=10 nodelay;
    proxy_pass http://arsenal_gsm_backend;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ================================
# ARSENAL API
# ================================
location ^~ /api/arsenal/ {
    limit_req zone=api_limit burst=50 nodelay;
    proxy_pass http://arsenal_gsm_backend;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_no_cache    1;
    proxy_cache_bypass 1;
}

# ================================
# ADMIN API
# ================================
location ^~ /api/admin/ {
    limit_req zone=api_limit burst=50 nodelay;
    proxy_pass http://jkh_backend;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_no_cache    1;
    proxy_cache_bypass 1;
}

# ================================
# API — ОБЩИЙ БЛОК (ЖКХ + Swagger)
# ================================
location ~ ^/(api|docs|redoc|openapi\.json|metrics) {
    limit_req zone=api_limit burst=50 nodelay;
    proxy_pass http://jkh_backend;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";

    proxy_no_cache    1;
    proxy_cache_bypass 1;
}

# ================================
# КОРЕНЬ + 404 ДЛЯ НЕСУЩЕСТВУЮЩИХ ПУТЕЙ
# ================================
# Раньше фолбэк на /portal.html отдавал 200 на любой мусорный путь →
# поисковики индексировали несуществующие страницы. Сайт многостраничный,
# SPA-роутинга на чистых URL нет → отдаём честный 404 + static/404.html.
error_page 404 /404.html;
location / {
    try_files $uri $uri/ =404;
}