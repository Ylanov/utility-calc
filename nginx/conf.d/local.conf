# ================================
# Nginx-конфиг для ЛОКАЛЬНОЙ разработки
# ================================

# ================================
# DOCKER DNS RESOLVER
# ================================
resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

# ================================
# UPSTREAMS (FIX: resolve + zone)
# ================================
upstream jkh_backend {
    zone jkh_backend 64k;
    server web_jkh:8000 resolve;
}

upstream arsenal_gsm_backend {
    zone arsenal_gsm_backend 64k;
    server web_arsenal_gsm:8000 resolve;
}

# ================================
# SERVER — LOCAL DEV
# ================================
server {
    listen 80;
    server_name localhost 127.0.0.1;

    root /usr/share/nginx/html/static;
    index index.html portal.html;

    charset utf-8;
    server_tokens off;

    # 50M default — override на крупные загрузки ниже (см. /api/admin/app/releases)
    client_max_body_size 50M;

    # ================================
    # HEALTHCHECK
    # ================================
    location = /health {
        proxy_pass http://jkh_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ================================
    # DOCS
    # ================================
    location ~ ^/(docs|openapi\.json|redoc)$ {
        proxy_pass http://jkh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /metrics {
        proxy_pass http://jkh_backend/metrics;
        proxy_set_header Host $host;
        access_log off;
    }

    # ================================
    # STATIC
    # ================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|webp)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
        access_log off;
    }

    location /static/generated_files/ {
        alias /usr/share/nginx/html/static/generated_files/;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # ================================
    # LOGIN
    # ================================
    location = /api/token {
        proxy_pass http://jkh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/(arsenal|gsm)/login$ {
        proxy_pass http://arsenal_gsm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================
    # ARSENAL / GSM
    # ================================
    location ^~ /api/arsenal/ {
        proxy_pass http://arsenal_gsm_backend;
        proxy_set_header Host $host;
        proxy_no_cache 1;
    }

    location ^~ /api/gsm/ {
        proxy_pass http://arsenal_gsm_backend;
        proxy_set_header Host $host;
        proxy_no_cache 1;
    }

    # ================================
    # ADMIN
    # ================================
    location ^~ /api/admin/ {
        proxy_pass http://jkh_backend;
        proxy_set_header Host $host;
        proxy_no_cache 1;
    }

    # ================================
    # API (общий)
    # ================================
    location ~ ^/api/ {
        proxy_pass http://jkh_backend;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_no_cache 1;
    }

    # ================================
    # MINIO
    # ================================
    location ^~ /minio-console/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
    }

    # ================================
    # SPA
    # ================================
    location / {
        try_files $uri $uri/ /portal.html;
    }
}