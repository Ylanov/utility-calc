# nginx/conf.d/local.conf
#
# Nginx-конфиг для ЛОКАЛЬНОЙ разработки.
# Только HTTP (порт 80), нет HTTPS, нет rate limiting,
# Swagger/docs/metrics доступны.
#
# Используется: docker-compose.local.yml

# ================================
# DOCKER DNS RESOLVER
# ================================
resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

# ================================
# UPSTREAMS
# ================================
upstream jkh_backend {
    server web_jkh:8000;
}

upstream arsenal_gsm_backend {
    server web_arsenal_gsm:8000;
}

# ================================
# SERVER — LOCAL DEV (HTTP only)
# ================================
server {
    listen 80;
    server_name localhost 127.0.0.1;

    root /usr/share/nginx/html/static;
    index index.html portal.html;

    charset utf-8;
    server_tokens off;

    client_max_body_size 50M;  # Больший лимит для удобства тестирования

    # ================================
    # HEALTHCHECK
    # ================================
    location = /health {
        proxy_pass http://jkh_backend/health;
        proxy_set_header Host $host;
        access_log off;
    }

    # ================================
    # SWAGGER / DOCS / METRICS
    # В production они заблокированы — здесь открыты.
    # ================================
    location ~ ^/(docs|openapi\.json|redoc)$ {
        proxy_pass http://jkh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /metrics {
        proxy_pass http://jkh_backend/metrics;
        proxy_set_header Host $host;
        access_log off;
    }

    # ================================
    # STATIC FILES (без кеша в dev)
    # ================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|webp)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
        access_log off;
    }

    location /static/generated_files/ {
        alias /usr/share/nginx/html/static/generated_files/;
        autoindex off;
        add_header Cache-Control "no-cache";
        access_log off;
    }

    # ================================
    # LOGIN
    # ================================
    location = /api/token {
        proxy_pass http://jkh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/(arsenal|gsm)/login$ {
        proxy_pass http://arsenal_gsm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================
    # ARSENAL API
    # ================================
    location ^~ /api/arsenal/ {
        proxy_pass http://arsenal_gsm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ================================
    # GSM API
    # ================================
    location ^~ /api/gsm/ {
        proxy_pass http://arsenal_gsm_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ================================
    # ADMIN API
    # ================================
    location ^~ /api/admin/ {
        proxy_pass http://jkh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ================================
    # API (ОБЩИЙ БЛОК — ЖКХ)
    # ================================
    location ~ ^/api/ {
        proxy_pass http://jkh_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ================================
    # MINIO Web Console (только в dev)
    # ================================
    location ^~ /minio-console/ {
        proxy_pass http://minio:9001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ================================
    # SPA
    # ================================
    location / {
        try_files $uri $uri/ /portal.html;
    }
}