# ================================
# RATE LIMITING & CACHE ZONES
# ================================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

proxy_cache_path /var/cache/nginx
levels=1:2
keys_zone=api_cache:50m
max_size=2g
inactive=60m
use_temp_path=off;

# ================================
# FILE CACHE OPTIMIZATION
# ================================
open_file_cache max=200000 inactive=20s;
open_file_cache_valid 30s;
open_file_cache_min_uses 2;
open_file_cache_errors on;

server {

    listen 80;

    server_name asy-tk.ru www.asy-tk.ru;

    root /usr/share/nginx/html/static;
    index index.html;

    charset utf-8;
    server_tokens off;

    # ================================
    # LIMITS
    # ================================
    client_max_body_size 10M;
    client_body_buffer_size 16k;

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    keepalive_timeout 65s;
    keepalive_requests 1000;

    # ================================
    # NETWORK OPTIMIZATION
    # ================================
    tcp_nodelay on;
    tcp_nopush on;

    # ================================
    # SECURITY HEADERS
    # ================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ================================
    # GZIP COMPRESSION
    # ================================
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;

    gzip_comp_level 6;
    gzip_min_length 256;

    gzip_buffers 16 8k;

    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/x-javascript
        image/svg+xml;

    # ================================
    # FAVICON
    # ================================
    location = /favicon.ico {
        try_files /favicon.ico =204;
        access_log off;
        log_not_found off;
    }

    # ================================
    # ROBOTS
    # ================================
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # ================================
    # BLOCK SENSITIVE FILES
    # ================================
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(wp-admin|wp-login|phpmyadmin|mysql|.env) {
        return 444;
    }

    # ================================
    # GENERATED FILES
    # ================================
    location /static/generated_files/ {

        alias /usr/share/nginx/html/static/generated_files/;

        autoindex off;

        expires 7d;

        add_header Cache-Control "public";

        access_log off;
    }

    # ================================
    # STATIC FILE CACHE
    # ================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|webp)$ {

        expires 30d;

        add_header Cache-Control "public, immutable";

        access_log off;

        try_files $uri =404;
    }

    # ================================
    # ADMIN API (NO CACHE)
    # ================================
    location ^~ /api/admin/ {

        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://web:8000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering on;
        proxy_buffers 16 32k;
        proxy_buffer_size 64k;

        proxy_busy_buffers_size 64k;

        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ================================
    # FASTAPI BACKEND
    # ================================
    location ~ ^/(api|token|docs|openapi\.json) {

        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://web:8000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header X-Real-IP $remote_addr;

        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;

        proxy_set_header Connection "";

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        proxy_buffering on;

        proxy_buffers 16 32k;
        proxy_buffer_size 64k;

        proxy_busy_buffers_size 64k;

        proxy_cache api_cache;

        proxy_cache_lock on;
        proxy_cache_lock_timeout 10s;

        proxy_cache_methods GET;

        proxy_cache_valid 200 5m;
        proxy_cache_valid 301 10m;
        proxy_cache_valid 404 1m;

        proxy_cache_bypass $http_authorization;
        proxy_cache_bypass $cookie_session;

        proxy_no_cache $http_authorization;

        add_header X-Cache-Status $upstream_cache_status;
    }

    # ================================
    # SPA ROUTING
    # ================================
    location / {

        try_files $uri $uri/ /index.html;

    }
}