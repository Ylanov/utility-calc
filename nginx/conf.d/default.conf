# ================================
# DOCKER DNS RESOLVER
# ================================
resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

# ================================
# UPSTREAMS
# ================================
upstream jkh_backend {
    server web_jkh:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

upstream arsenal_gsm_backend {
    server web_arsenal_gsm:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

# ================================
# RATE LIMITING
# ================================
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=50r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# ================================
# PROXY CACHE
# ================================
proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=api_cache:50m
    max_size=2g
    inactive=60m
    use_temp_path=off;

# ================================
# FILE CACHE
# ================================
open_file_cache          max=200000 inactive=30s;
open_file_cache_valid    60s;
open_file_cache_min_uses 2;
open_file_cache_errors   on;

# ================================
# GLOBAL OPTIMIZATION
# ================================
tcp_nopush  on;
tcp_nodelay on;

# ================================================================
# MAIN SERVER BLOCK (HTTP ONLY)
# Принимает внутренний трафик с VPS по VPN и localhost
# ================================================================
server {
    listen 80;
    server_name asy-tk.ru www.asy-tk.ru localhost 127.0.0.1;

    root  /usr/share/nginx/html/static;
    index index.html portal.html;

    charset       utf-8;
    server_tokens off;

    # ================================
    # ТАЙМАУТЫ ПРОКСИРОВАНИЯ
    # ================================
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_next_upstream       error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 5;

    # ================================
    # ЛИМИТЫ
    # ================================
    client_max_body_size    10M;
    client_body_buffer_size 16k;

    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;

    keepalive_timeout  65s;
    keepalive_requests 2000;

    # ================================
    # ЗАГОЛОВКИ БЕЗОПАСНОСТИ
    # ================================
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src 'self' fonts.gstatic.com cdnjs.cloudflare.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;

    # ================================
    # GZIP
    # ================================
    gzip            on;
    gzip_disable    "msie6";
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers    16 8k;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ================================
    # СТАТИЧЕСКИЕ ФАЙЛЫ
    # ================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ================================
    # СГЕНЕРИРОВАННЫЕ ФАЙЛЫ
    # ================================
    location /static/generated_files/ {
        alias /usr/share/nginx/html/static/generated_files/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ================================
    # HEALTHCHECK
    # ================================
    location = /health {
        proxy_pass http://jkh_backend/health;

        # Передаем IP, который прислал внешний Nginx, если есть, иначе адрес VPN
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ================================
    # БЛОКИРОВКА СКРЫТЫХ / ОПАСНЫХ ФАЙЛОВ
    # ================================
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(wp-admin|wp-login|phpmyadmin|mysql|\.env) {
        return 444;
    }

    location ~* ^/(docs|redoc|openapi\.json|metrics)$ {
        return 403;
    }

    # ================================
    # LOGIN (жёсткий rate limit)
    # ================================
    location = /api/token {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://jkh_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/(arsenal|gsm)/login$ {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://arsenal_gsm_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================
    # ARSENAL API
    # ================================
    location ^~ /api/arsenal/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://arsenal_gsm_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache    1;
        proxy_cache_bypass 1;
    }

    # ================================
    # GSM API
    # ================================
    location ^~ /api/gsm/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://arsenal_gsm_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache    1;
        proxy_cache_bypass 1;
    }

    # ================================
    # ADMIN API
    # ================================
    location ^~ /api/admin/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://jkh_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache    1;
        proxy_cache_bypass 1;
    }

    # ================================
    # API — ОБЩИЙ БЛОК (ЖКХ)
    # ================================
    location ~ ^/api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://jkh_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $http_x_real_ip;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_no_cache    1;
        proxy_cache_bypass 1;
    }

    # ================================
    # SPA — фоллбек на portal.html
    # ================================
    location / {
        try_files $uri $uri/ /portal.html;
    }
}