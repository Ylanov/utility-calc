# nginx/conf.d/default.conf
#
# Production Nginx конфиг.
# Структура файлов в /etc/nginx/conf.d/:
#
#   default.conf           ← этот файл
#   common_proxy.conf      ← таймауты, лимиты, gzip, базовые security headers
#   common_locations.conf  ← все location-блоки (API, статика, SPA)
#   local.conf             ← используется только в docker-compose.local.yml
#
# Почему localhost-блок использует include, а HTTPS-блок — нет:
#   HSTS (Strict-Transport-Security) и CSP разрешены только для HTTPS.
#   Если вынести их в include и случайно подключить к HTTP-блоку —
#   браузер заблокирует сайт. Безопаснее держать их инлайном в HTTPS-блоке.

# ================================
# DOCKER DNS RESOLVER
# ================================
resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

# ================================
# UPSTREAMS
# ================================
upstream jkh_backend {
    server web_jkh:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

upstream arsenal_gsm_backend {
    server web_arsenal_gsm:8000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

# ================================
# RATE LIMITING
# ================================
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=50r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# ================================
# PROXY CACHE
# ================================
proxy_cache_path /var/cache/nginx
    levels=1:2
    keys_zone=api_cache:50m
    max_size=2g
    inactive=60m
    use_temp_path=off;

# ================================
# FILE CACHE
# ================================
open_file_cache          max=200000 inactive=30s;
open_file_cache_valid    60s;
open_file_cache_min_uses 2;
open_file_cache_errors   on;

# ================================
# GLOBAL OPTIMIZATION
# ================================
tcp_nopush  on;
tcp_nodelay on;

# ================================================================
# 1. HTTP → HTTPS REDIRECT (только для asy-tk.ru)
# ================================================================
server {
    listen 80;
    server_name asy-tk.ru www.asy-tk.ru;

    return 301 https://$host$request_uri;
}

# ================================================================
# 2. LOCALHOST:80 — внутренний server-блок
#
# Доступен ТОЛЬКО с самого VPS: curl http://localhost/health
# Используется для:
#   - health-check из GitHub Actions (self-hosted runner)
#   - внутренней отладки — Swagger и metrics открыты (недоступны из интернета)
#   - проксирования если перед этим контейнером стоит внешний Nginx на VPS
# ================================================================
server {
    listen 80;
    server_name localhost 127.0.0.1;

    root  /usr/share/nginx/html/static;
    index index.html portal.html;

    charset       utf-8;
    server_tokens off;

    # Таймауты, лимиты, gzip, базовые security-заголовки (без HSTS и CSP)
    include /etc/nginx/snippets/common_proxy.conf;

    # Все location-блоки (API, статика, SPA). Swagger здесь открыт.
    include /etc/nginx/snippets/common_locations.conf;
}

# ================================================================
# 3. HTTPS PRODUCTION (asy-tk.ru)
#
# Настройки инлайном — не через include — потому что:
#   HSTS и CSP допустимы ТОЛЬКО для HTTPS и нельзя их
#   случайно подключить в HTTP-блок через общий include.
# ================================================================
server {
    listen 443 ssl;
    http2  on;
    server_name asy-tk.ru www.asy-tk.ru;

    # ================================
    # SSL
    # ================================
    ssl_certificate     /etc/letsencrypt/live/asy-tk.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asy-tk.ru/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    root  /usr/share/nginx/html/static;
    index index.html portal.html;

    charset       utf-8;
    server_tokens off;

    # ================================
    # ТАЙМАУТЫ ПРОКСИРОВАНИЯ
    # ================================
    proxy_connect_timeout 5s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    proxy_next_upstream       error timeout http_502 http_503 http_504;
    proxy_next_upstream_tries 5;

    # ================================
    # ЛИМИТЫ
    # ================================
    client_max_body_size    10M;
    client_body_buffer_size 16k;

    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;

    keepalive_timeout  65s;
    keepalive_requests 2000;

    # ================================
    # ЗАГОЛОВКИ БЕЗОПАСНОСТИ — ПОЛНЫЙ НАБОР ДЛЯ HTTPS
    # ================================
    add_header X-Frame-Options        "SAMEORIGIN"                      always;
    add_header X-Content-Type-Options "nosniff"                         always;
    add_header X-XSS-Protection       "1; mode=block"                   always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy     "geolocation=(), microphone=(), camera=()" always;

    # HSTS — только HTTPS. Принуждает браузер использовать HTTPS на год вперёд.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP — ограничивает загрузку ресурсов только с доверенных источников.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com cdnjs.cloudflare.com; font-src 'self' fonts.gstatic.com cdnjs.cloudflare.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none';" always;

    # ================================
    # GZIP
    # ================================
    gzip            on;
    gzip_disable    "msie6";
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_buffers    16 8k;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ================================
    # СТАТИЧЕСКИЕ ФАЙЛЫ (долгий кеш)
    # ================================
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ================================
    # СГЕНЕРИРОВАННЫЕ ФАЙЛЫ (квитанции)
    # ================================
    location /static/generated_files/ {
        alias /usr/share/nginx/html/static/generated_files/;
        autoindex off;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ================================
    # HEALTHCHECK
    # ================================
    location = /health {
        proxy_pass http://jkh_backend/health;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ================================
    # БЛОКИРОВКА СКРЫТЫХ / ОПАСНЫХ ФАЙЛОВ
    # ================================
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~* /(wp-admin|wp-login|phpmyadmin|mysql|\.env) {
        return 444;
    }

    # Swagger и metrics закрыты в production.
    # FastAPI тоже отдаёт 404 если ENVIRONMENT=production — двойная защита.
    location ~* ^/(docs|redoc|openapi\.json|metrics)$ {
        return 403;
    }

    # ================================
    # LOGIN (жёсткий rate limit)
    # ================================
    location = /api/token {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://jkh_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/(arsenal|gsm)/login$ {
        limit_req zone=login_limit burst=10 nodelay;
        proxy_pass http://arsenal_gsm_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================
    # ARSENAL API
    # ================================
    location ^~ /api/arsenal/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://arsenal_gsm_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache    1;
        proxy_cache_bypass 1;
    }

    # ================================
    # GSM API
    # ================================
    location ^~ /api/gsm/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://arsenal_gsm_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache    1;
        proxy_cache_bypass 1;
    }

    # ================================
    # ADMIN API
    # ================================
    location ^~ /api/admin/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://jkh_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_no_cache    1;
        proxy_cache_bypass 1;
    }

    # ================================
    # API — ОБЩИЙ БЛОК (ЖКХ)
    # ================================
    location ~ ^/api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://jkh_backend;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_no_cache    1;
        proxy_cache_bypass 1;
    }

    # ================================
    # SPA — фоллбек на portal.html
    # ================================
    location / {
        try_files $uri $uri/ /portal.html;
    }
}