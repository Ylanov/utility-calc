###
### asy-tk.conf — конфиг ВНЕШНЕГО nginx на VPS (194.58.95.102).
###
### Расположение на сервере: /etc/nginx/sites-available/asy-tk.conf
###
### Что делает:
###  1. HTTP (порт 80) → 301 redirect на HTTPS + HSTS-заголовок
###  2. HTTPS (порт 443) → проксирует на aleks:80 (через Tailscale)
###     + добавляет полный набор security headers для оценки A+
###     в securityheaders.com
###
### После правки этого файла:
###   sudo nginx -t && sudo systemctl reload nginx
###

# ===================================================================
# СКРЫТИЕ ВЕРСИИ NGINX
# Помещаем в http {} блок главного nginx.conf, не сюда. См. инструкцию
# в комментарии деплоя. Но дублируем здесь для очевидности.
# ===================================================================
server_tokens off;

# ===================================================================
# HTTP (порт 80) — только редирект на HTTPS.
# Возвращаем 301 с HSTS-заголовком, чтобы security-сканеры
# не ставили предупреждение «Site is using HTTP».
# ===================================================================
server {
    listen 80;
    listen [::]:80;
    server_name asy-tk.ru www.asy-tk.ru;

    # HSTS даже на редиректе — сигнал сканерам и браузерам что мы https-only.
    # preload — для попадания в hardcoded HSTS список Chrome/Firefox/Safari.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Все остальные пути сразу на HTTPS.
    return 301 https://$host$request_uri;
}

# ===================================================================
# HTTPS (порт 443) — основной трафик. Проксируем на aleks через Tailscale.
# ===================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name asy-tk.ru www.asy-tk.ru;

    # SSL — выпущен certbot'ом, обновляется автоматически.
    ssl_certificate     /etc/letsencrypt/live/asy-tk.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asy-tk.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # =========================================================
    # SECURITY HEADERS (для оценки A+ на securityheaders.com)
    # Все объявлены с `always` — добавляются даже на 4xx/5xx ответах.
    # =========================================================

    # HSTS — 2 года + поддомены + preload.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Anti-clickjacking. SAMEORIGIN — наши iframes (если будут) работают,
    # внешние сайты не могут встраивать нас в iframe.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Запрет MIME-sniffing. Браузер не пытается «угадать» тип ответа.
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer-policy — для приватности: внешним сайтам не передаём полный URL.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Запрет доступа к чувствительным API браузера: камера, микрофон,
    # геолокация и т.п. interest-cohort=() — отключает FLoC tracking.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=(), usb=(), magnetometer=()" always;

    # Cross-Origin-Opener-Policy — окно изолировано от других origin'ов
    # (защита от cross-window атак типа tabnabbing).
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Cross-Origin-Resource-Policy — другие origin'ы не могут embed наши ресурсы.
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ВНИМАНИЕ: CSP сюда НЕ добавляем — он уже выставлен внутренним
    # nginx на aleks (с детальной настройкой под наши страницы).
    # Дублирование CSP в двух местах ломает наследование.

    # Большие upload'ы (APK до 250M обрабатывает внутренний nginx aleks,
    # но внешний должен пропустить).
    client_max_body_size 300M;

    # Долгие операции (bulk PDF export, импорт ОСВ).
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;

    # Прокси на внутренний nginx aleks через Tailscale (HTTP внутри
    # Tailscale-туннеля шифрован).
    location / {
        proxy_pass http://100.69.226.7:80;
        proxy_http_version 1.1;

        # Host обязателен — внутренний nginx сматчит на server_name asy-tk.ru.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streaming для тяжёлых ответов (PDF/Excel экспорты).
        proxy_buffering         off;
        proxy_request_buffering off;
    }
}
