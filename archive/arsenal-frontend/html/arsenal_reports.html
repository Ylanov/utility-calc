<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчёты · СТРОБ Арсенал</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  body { font-family: system-ui, -apple-system, sans-serif; }
  .tab-btn.active { background:#1e293b; color:#fff; }
</style>
</head>
<body class="bg-slate-100 min-h-screen">
<div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

<div class="max-w-7xl mx-auto p-5">
  <header class="mb-6 flex items-center justify-between">
    <div>
      <a href="arsenal_dashboard.html" class="text-xs text-slate-500 hover:text-slate-700">
        <i class="fa-solid fa-arrow-left"></i> Дашборд
      </a>
      <h1 class="text-2xl font-bold text-slate-800 mt-1 flex items-center gap-3">
        <i class="fa-solid fa-chart-pie text-purple-600"></i>
        Отчёты и аналитика
      </h1>
    </div>
  </header>

  <div class="flex gap-1 mb-5 bg-white p-1 rounded-lg shadow-sm w-fit flex-wrap">
    <button data-tab="balance" class="tab-btn active px-4 py-2 rounded-md text-sm font-medium">
      <i class="fa-solid fa-scale-balanced"></i> Балансовая ведомость
    </button>
    <button data-tab="mol" class="tab-btn px-4 py-2 rounded-md text-sm font-medium hover:bg-slate-100">
      <i class="fa-solid fa-user-tie"></i> По МОЛ
    </button>
    <button data-tab="turnover" class="tab-btn px-4 py-2 rounded-md text-sm font-medium hover:bg-slate-100">
      <i class="fa-solid fa-arrow-right-arrow-left"></i> Оборот за период
    </button>
    <button data-tab="top" class="tab-btn px-4 py-2 rounded-md text-sm font-medium hover:bg-slate-100">
      <i class="fa-solid fa-fire"></i> Топ-позиции
    </button>
    <button data-tab="timeline" class="tab-btn px-4 py-2 rounded-md text-sm font-medium hover:bg-slate-100">
      <i class="fa-solid fa-clock-rotate-left"></i> История изделия
    </button>
  </div>

  <!-- ============= БАЛАНСОВАЯ ВЕДОМОСТЬ ============= -->
  <div id="pane-balance" class="tab-pane">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex items-center gap-3 flex-wrap">
      <label class="text-sm text-slate-600">Объект:</label>
      <select id="balObject" class="border border-slate-300 rounded px-3 py-2 text-sm">
        <option value="">Все объекты</option>
      </select>
      <button id="btnLoadBalance" class="bg-purple-600 text-white px-4 py-2 rounded text-sm">
        <i class="fa-solid fa-refresh"></i> Обновить
      </button>
      <a id="btnExportBalance" href="#" class="ml-auto bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm">
        <i class="fa-solid fa-file-excel"></i> Excel
      </a>
    </div>
    <div id="balanceBody" class="space-y-4">
      <div class="bg-white rounded-xl shadow-sm p-8 text-center text-slate-400">
        <i class="fa-solid fa-scale-balanced text-3xl mb-2"></i>
        <div>Нажмите «Обновить» чтобы загрузить данные</div>
      </div>
    </div>
  </div>

  <!-- ============= ПО МОЛ ============= -->
  <div id="pane-mol" class="tab-pane hidden">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex items-center gap-3">
      <button id="btnLoadMol" class="bg-purple-600 text-white px-4 py-2 rounded text-sm">
        <i class="fa-solid fa-refresh"></i> Загрузить
      </button>
    </div>
    <div id="molBody" class="space-y-3"></div>
  </div>

  <!-- ============= ОБОРОТ ============= -->
  <div id="pane-turnover" class="tab-pane hidden">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4 grid grid-cols-1 md:grid-cols-4 gap-3">
      <div>
        <label class="block text-xs text-slate-600 mb-1">С даты</label>
        <input type="date" id="turnFrom" class="w-full border border-slate-300 rounded px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-xs text-slate-600 mb-1">По дату</label>
        <input type="date" id="turnTo" class="w-full border border-slate-300 rounded px-3 py-2 text-sm">
      </div>
      <div>
        <label class="block text-xs text-slate-600 mb-1">Объект</label>
        <select id="turnObject" class="w-full border border-slate-300 rounded px-3 py-2 text-sm">
          <option value="">Все</option>
        </select>
      </div>
      <div class="flex items-end">
        <button id="btnLoadTurnover" class="w-full bg-purple-600 text-white px-4 py-2 rounded text-sm">
          <i class="fa-solid fa-play"></i> Построить
        </button>
      </div>
    </div>
    <div id="turnoverBody"></div>
  </div>

  <!-- ============= ТОП ============= -->
  <div id="pane-top" class="tab-pane hidden">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex items-center gap-3 flex-wrap">
      <label class="text-sm text-slate-600">За последние</label>
      <select id="topDays" class="border border-slate-300 rounded px-3 py-2 text-sm">
        <option value="7">7 дней</option>
        <option value="30" selected>30 дней</option>
        <option value="90">90 дней</option>
        <option value="365">год</option>
      </select>
      <button id="btnLoadTop" class="bg-purple-600 text-white px-4 py-2 rounded text-sm">
        <i class="fa-solid fa-play"></i> Показать
      </button>
    </div>
    <div id="topBody" class="bg-white rounded-xl shadow-sm p-4"></div>
  </div>

  <!-- ============= TIMELINE / SEARCH ============= -->
  <div id="pane-timeline" class="tab-pane hidden">
    <div class="bg-white rounded-xl shadow-sm p-4 mb-4 flex items-center gap-3">
      <input type="text" id="searchQ" placeholder="Серийник, инв.номер или название..." class="flex-1 border border-slate-300 rounded px-3 py-2 text-sm">
      <button id="btnSearch" class="bg-purple-600 text-white px-4 py-2 rounded text-sm">
        <i class="fa-solid fa-magnifying-glass"></i> Найти
      </button>
    </div>
    <div id="searchResults" class="mb-4"></div>
    <div id="timelineBody"></div>
  </div>
</div>

<script src="js/arsenal-core.js"></script>
<script src="js/arsenal-reports.js"></script>
</body>
</html>
