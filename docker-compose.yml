services:

  db:
    image: postgres:15
    container_name: utility_calc_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    # СТРОКА command: ... БЫЛА УДАЛЕНА
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -p 5432 -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - utility_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: utility_calc_pgbouncer
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 10000
      DEFAULT_POOL_SIZE: 50
      RESERVE_POOL_SIZE: 20
      MAX_DB_CONNECTIONS: 100
      ADMIN_USERS: ${POSTGRES_USER}
      AUTH_TYPE: plain
      AUTH_USER: ${POSTGRES_USER}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - utility_net

  redis:
    image: redis:7
    container_name: utility_calc_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - utility_net

  minio:
    image: minio/minio:latest
    container_name: utility_calc_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - utility_net

  migration_job:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_migrations
    restart: "no"
    security_opt:
      - seccomp:unconfined
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      sleep 5 &&
      alembic upgrade head &&
      alembic -c alembic_arsenal.ini upgrade head &&
      python -m app.core.initial_data
      "
    networks:
      - utility_net

  web:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_web
    restart: always
    security_opt:
      - seccomp:unconfined
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w ${WEB_CONCURRENCY:-4}
      -b 0.0.0.0:8000
      --timeout 120
    depends_on:
      migration_job:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - utility_net

  worker_default:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_worker_default
    restart: always
    security_opt:
      - seccomp:unconfined
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
    command: >
      celery -A app.worker worker
      --loglevel=info
      --queues=default
      --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    networks:
      - utility_net

  worker_heavy:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_worker_heavy
    restart: always
    security_opt:
      - seccomp:unconfined
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
    command: >
      celery -A app.worker worker
      --loglevel=info
      --queues=heavy
      --concurrency=4
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    networks:
      - utility_net

  worker_beat:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_beat
    restart: always
    security_opt:
      - seccomp:unconfined
    env_file:
      - .env
    command: celery -A app.worker beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    networks:
      - utility_net

  nginx:
    image: nginx:alpine
    container_name: utility_calc_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./static:/usr/share/nginx/html/static
    depends_on:
      - web
    networks:
      - utility_net

  backup:
    image: postgres:15-alpine
    container_name: utility_calc_backup
    restart: always
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./backups:/backups
      - ./backup.sh:/usr/local/bin/backup.sh
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      chmod +x /usr/local/bin/backup.sh &&
      while true; do /usr/local/bin/backup.sh; sleep 86400; done
      "
    networks:
      - utility_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  utility_net:
    driver: bridge