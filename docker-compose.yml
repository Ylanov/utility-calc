version: "3.8"

# Базовый шаблон для Python-сервисов (DRY)
x-app-base: &app-base
  build:
    context: .
    target: app_runner
  restart: always
  env_file: ./.env
  environment:
    - DB_HOST=pgbouncer
    - DB_PORT=5432
    # Оптимизация Python для контейнеров
    - PYTHONUNBUFFERED=1
    - PYTHONDONTWRITEBYTECODE=1
  networks:
    - utility_net
  # Лимиты ресурсов (опционально, но полезно для продакшена)
  deploy:
    resources:
      limits:
        memory: 2G

services:
  # ==========================================
  # MIGRATION JOB (Запускается один раз)
  # ==========================================
  migration_job:
    <<: *app-base
    container_name: utility_calc_migrations
    restart: "no"  # Не перезапускать после успешного завершения
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    # Команда выполняет миграции и сидинг данных
    command: >
      sh -c "
      echo '---> Waiting for PgBouncer...' && sleep 5 &&
      echo '---> Running Utility DB migrations...' && alembic upgrade head &&
      echo '---> Running Arsenal/GSM DB migrations...' && alembic -c alembic_arsenal.ini upgrade head &&
      echo '---> Seeding initial data...' && python -m app.core.initial_data
      "

  # ==========================================
  # WEB API (Масштабируемый сервис)
  # ==========================================
  web:
    <<: *app-base
    container_name: utility_calc_web
    # Ждем завершения миграций перед запуском
    depends_on:
      migration_job:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    # Запускаем Gunicorn без лишних действий.
    # Количество воркеров берется из ENV или рассчитывается (обычно 2 * CPU + 1).
    # Для вашего сервера можно ставить WEB_CONCURRENCY=10-20.
    command: gunicorn app.main:app -k uvicorn.workers.UvicornWorker -w ${WEB_CONCURRENCY:-4} -b 0.0.0.0:8000 --timeout 120

  # ==========================================
  # CELERY WORKERS
  # ==========================================
  worker_default:
    <<: *app-base
    container_name: utility_calc_worker_default
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    command: celery -A app.worker worker --loglevel=info --queues=default --hostname=default@%h --concurrency=${CELERY_WORKER_CONCURRENCY:-4}

  worker_heavy:
    <<: *app-base
    container_name: utility_calc_worker_heavy
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    # Для тяжелых задач (PDF) concurrency меньше, но памяти больше (настроено в worker.py)
    command: celery -A app.worker worker --loglevel=info --queues=heavy --hostname=heavy@%h --concurrency=4

  worker_beat:
    <<: *app-base
    container_name: utility_calc_beat
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    command: celery -A app.worker beat --loglevel=info

  # ==========================================
  # INFRASTRUCTURE
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: utility_calc_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - utility_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: utility_calc_pgbouncer
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=5000  # Увеличено для 20к пользователей
      - DEFAULT_POOL_SIZE=40
      - RESERVE_POOL_SIZE=10
      - MAX_DB_CONNECTIONS=100
      - ADMIN_USERS=${POSTGRES_USER}
      - AUTH_TYPE=plain
      - AUTH_USER=${POSTGRES_USER}
      - AUTH_FILE=/etc/pgbouncer/userlist.txt
    depends_on:
      db:
        condition: service_healthy
    networks:
      - utility_net

  db:
    image: postgres:15-alpine
    container_name: utility_calc_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Тюнинг PostgreSQL для 144GB RAM (примерный, лучше вынести в postgresql.conf)
      # shared_buffers=32GB, effective_cache_size=96GB, work_mem=64MB, maintenance_work_mem=2GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - utility_net

  redis:
    image: redis:7-alpine
    container_name: utility_calc_redis
    restart: always
    # Оптимизация Redis: удаление старых ключей (LRU) при заполнении 1GB
    command: redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - utility_net

  nginx:
    image: nginx:alpine
    container_name: utility_calc_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/certs:/etc/nginx/certs
      - ./static:/usr/share/nginx/html/static
      # shared_data больше не нужен, файлы генерируются в /tmp и уходят в S3
    depends_on:
      - web
    networks:
      - utility_net

  backup:
    image: postgres:15-alpine
    container_name: utility_calc_backup
    restart: always
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDB: ${POSTGRES_DB}
    volumes:
      - ./backups:/backups
      - ./backup.sh:/usr/local/bin/backup.sh
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      chmod +x /usr/local/bin/backup.sh &&
      while true; do /usr/local/bin/backup.sh; sleep 86400; done
      "
    networks:
      - utility_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  utility_net:
    driver: bridge