services:

  db:
    image: postgres:15
    container_name: utility_calc_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - utility_net

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: utility_calc_pgbouncer
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      RESERVE_POOL_SIZE: 10
      MAX_DB_CONNECTIONS: 100
      ADMIN_USERS: ${POSTGRES_USER}
      AUTH_TYPE: plain
      AUTH_USER: ${POSTGRES_USER}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - utility_net

  redis:
    image: redis:7
    container_name: utility_calc_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1000 --maxmemory 512mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - utility_net

  minio:
    image: minio/minio:latest
    container_name: utility_calc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - utility_net

  migration_job:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_migrations
    restart: "no"
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
    depends_on:
      pgbouncer:
        condition: service_healthy
    command: >
      sh -c "
      echo 'Waiting for PgBouncer...' &&
      sleep 5 &&
      alembic upgrade head &&
      alembic -c alembic_arsenal.ini upgrade head &&
      python -m app.core.initial_data
      "
    networks:
      - utility_net

  web:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    ports:
      - "8000:8000"
    command: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w ${WEB_CONCURRENCY:-8}
      -b 0.0.0.0:8000
      --timeout 120
      --keep-alive 5
      --worker-tmp-dir /dev/shm
      --max-requests 2000
      --max-requests-jitter 200
    depends_on:
      migration_job:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - utility_net

  worker_default:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_worker_default
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
    command: >
      celery -A app.worker worker
      --loglevel=info
      --queues=default
      --concurrency=${CELERY_WORKER_CONCURRENCY:-8}
      --max-tasks-per-child=500
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    networks:
      - utility_net

  worker_heavy:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_worker_heavy
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: pgbouncer
      DB_PORT: 5432
    command: >
      celery -A app.worker worker
      --loglevel=info
      --queues=heavy
      --concurrency=8
      --max-tasks-per-child=500
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    networks:
      - utility_net

  worker_beat:
    image: ghcr.io/ylanov/utility-calc:latest
    container_name: utility_calc_beat
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A app.worker beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
      migration_job:
        condition: service_completed_successfully
    networks:
      - utility_net

  backup:
    image: postgres:15-alpine
    container_name: utility_calc_backup
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
    volumes:
      - ./backups:/backups
      - ./backup.sh:/usr/local/bin/backup.sh
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      chmod +x /usr/local/bin/backup.sh &&
      while true; do /usr/local/bin/backup.sh; sleep 86400; done
      "
    networks:
      - utility_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  utility_net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1360