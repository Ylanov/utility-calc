# Разовая проверка автопогашения буфера GSheets (gsheets_supersede) на проде,
# когда SSH недоступен. Печатает ТОЛЬКО id/статусы/счётчики — БЕЗ ФИО
# (репозиторий публичный). Скрипт передан base64 (кириллица в поиске).
name: Buffer supersede check (aleks)

on:
  workflow_dispatch:

jobs:
  buffer-check:
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: heal + статусы строк буфера целевого жильца (без ПДн)
        run: |
          docker exec -e PYTHONPATH=/app utility_calc_web_jkh python -c "import base64;exec(base64.b64decode('').decode())"
