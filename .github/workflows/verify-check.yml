# Разовая верификация на проде (SSH недоступен): QR-PDF фича + диагностика
# дельт конкретного жильца. Вывод БЕЗ ПДн — только id/числа/флаги
# (репозиторий публичный). Скрипты — base64 (кириллица в поиске).
name: Verify check (aleks)

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: self-hosted
    timeout-minutes: 8
    steps:
      - name: маркеры статики (кнопки жилфонда)
        run: |
          S=/opt/utility_calc/static
          echo "btnQrPdf в tab_housing: $(grep -c btnQrPdf "$S/components/admin/tab_housing.html" 2>/dev/null || echo 0)"
          echo "downloadQrPdf в housing.js: $(grep -c downloadQrPdf "$S/js/modules/housing.js" 2>/dev/null || echo 0)"

      - name: QR-роуты + генерация PDF по крупнейшей общаге (read-only)
        run: |
          docker exec -e PYTHONPATH=/app utility_calc_web_jkh python -c "import base64;exec(base64.b64decode('').decode())"

      - name: диагностика дельт жильца (без ПДн)
        run: |
          docker exec -e PYTHONPATH=/app utility_calc_web_jkh python -c "import base64;exec(base64.b64decode('').decode())"
