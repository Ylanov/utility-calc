name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

  quality-check:
    name: Code Quality and Security
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint code
        run: ruff check . --fix --unsafe-fixes

      - name: Security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          ignore-unfixed: true
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          pytest || echo "Tests skipped"



  build:
    name: Build and Push Docker Image
    needs: quality-check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max



  deploy:
    name: Deploy to Production
    needs: build
    runs-on: self-hosted

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Sync project files
        run: |
          rsync -av \
          --delete \
          --exclude backups \
          --exclude .env \
          ./ /opt/utility_calc/


      - name: Create environment file
        working-directory: /opt/utility_calc
        run: |
          echo "${{ secrets.PROD_ENV_FILE }}" > .env


      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}


      - name: Backup current containers
        working-directory: /opt/utility_calc
        run: |
          docker compose ps > previous_state.txt


      - name: Pull latest images
        working-directory: /opt/utility_calc
        run: |
          docker compose pull


      - name: Deploy containers
        working-directory: /opt/utility_calc
        run: |
          docker compose up -d --remove-orphans


      - name: Wait for startup
        run: sleep 20


      - name: Health check
        run: |
          ATTEMPTS=10
          SUCCESS=false

          for i in $(seq 1 $ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/docs || true)

            if [ "$STATUS" = "200" ]; then
              SUCCESS=true
              break
            fi

            echo "Health check attempt $i failed"
            sleep 5
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "Deployment failed, rolling back..."
            docker compose down
            docker compose up -d
            exit 1
          fi


      - name: Cleanup docker
        run: |
          docker image prune -af
          docker container prune -f