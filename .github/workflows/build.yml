name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: production-deploy
  cancel-in-progress: false

# ==========================================
# ===== MIGRATION CHECK (ОЧЕНЬ ВАЖНО) ======
# ==========================================
jobs:
  migration-check:
    name: Check DB Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Wait for DB
        run: |
          until pg_isready -h localhost -p 5432; do
            sleep 2
          done

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          alembic upgrade head

# ==========================================
# ===== QUALITY =============================
# ==========================================
  quality-check:
    name: Code Quality and Security
    needs: migration-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff jq pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint code
        run: ruff check . --fix --unsafe-fixes

      # =========================
      # DEPENDENCY SECURITY
      # =========================
      - name: Run pip-audit
        run: pip-audit

      # =========================
      # TRIVY SCAN (FILESYSTEM)
      # =========================
      - name: Run Trivy (JSON report)
        run: |
          docker run --rm \
            -v $PWD:/app \
            aquasec/trivy fs /app \
            --format json \
            --output /app/trivy-report.json \
            --severity HIGH,CRITICAL

      - name: Fail on critical vulnerabilities
        run: |
          if jq '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")' trivy-report.json | grep -q .; then
            echo "CRITICAL vulnerabilities found!"
            exit 1
          fi

      # =========================
      # GITLEAKS
      # =========================
      - name: Run Gitleaks
        run: |
          docker run --rm -v $(pwd):/repo zricethezav/gitleaks:latest \
          detect --source=/repo --exit-code 1

      # =========================
      # SONARQUBE
      # =========================
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=utility-calc
            -Dsonar.projectName="Utility Calculator & Arsenal"
            -Dsonar.python.version=3.13
            -Dsonar.sources=app,static,templates
            -Dsonar.exclusions=alembic/**,alembic_arsenal/**,app/tests/**,static/generated_files/**

# ==========================================
# ===== BUILD ===============================
# ==========================================
  build:
    name: Build and Push Docker Image
    needs: quality-check
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # =========================
      # TRIVY IMAGE SCAN
      # =========================
      - name: Scan Docker image
        run: |
          docker run --rm aquasec/trivy image \
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          --severity HIGH,CRITICAL

# ==========================================
# ===== DEPLOY ==============================
# ==========================================
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare project directory
        run: |
          sudo mkdir -p /opt/utility_calc/
          sudo chown -R $USER:$USER /opt/utility_calc/ || true

      - name: Sync project files safely
        run: |
          rsync -av \
          --delete \
          --exclude backups \
          --exclude .env \
          --exclude docker-compose.monitoring.yml \
          --exclude prometheus.yml \
          --exclude grafana_data \
          --exclude prometheus_data \
          --exclude /opt/security \
          ./ /opt/utility_calc/

      - name: Create environment file
        working-directory: /opt/utility_calc
        run: |
          echo "${{ secrets.PROD_ENV_FILE }}" > .env

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Pull latest images
        working-directory: /opt/utility_calc
        run: docker compose pull

      # ✅ БЕЗ downtime
      - name: Deploy containers
        working-directory: /opt/utility_calc
        run: docker compose up -d --remove-orphans

      - name: Wait for startup
        run: sleep 40

      - name: Health check
        working-directory: /opt/utility_calc
        run: |
          ATTEMPTS=15
          SUCCESS=false

          for i in $(seq 1 $ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health || true)

            if [ "$STATUS" = "200" ]; then
              SUCCESS=true
              echo "Service is healthy!"
              break
            fi

            echo "Health check attempt $i failed (status code: $STATUS)"
            sleep 5
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "Deployment failed!"

            docker compose logs --tail 50 web_jkh || true
            docker compose logs --tail 50 web_arsenal_gsm || true
            docker compose logs --tail 50 nginx || true

            exit 1
          fi

      - name: Cleanup docker
        run: |
          docker image prune -af
          docker container prune -f