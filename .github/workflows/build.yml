name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main
  # Ручной запуск из UI Actions / `gh workflow run build.yml`.
  # Добавлено 26.05.2026 после инцидента когда GitHub Actions был
  # degraded_performance — push-вебхуки приходили, но workflow_run не
  # создавался. Ручной триггер закрывает кейс «срочно деплоить, а CI
  # глючит».
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Все JS-actions обновлены до major-версий с native Node 24 поддержкой
  # (apr 2026): checkout@v5, setup-python@v6, cache@v5, docker/*@v4-v7.
  # Раньше тут стоял `FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true` как
  # переходная мера — она больше не нужна и убрана.

concurrency:
  group: production-deploy
  cancel-in-progress: false

# ==========================================
# ===== MIGRATION CHECK =====================
# ==========================================
jobs:
  migration-check:
    name: Check DB Migrations
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for database
        run: |
          until pg_isready -h localhost -p 5432 -U postgres; do
            sleep 2
          done

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: alembic upgrade head

# ==========================================
# ===== QUALITY =============================
# ==========================================
  quality-check:
    name: Code Quality and Security
    # Идёт ПАРАЛЛЕЛЬНО migration-check и build — needs убран. Гейтом служит
    # deploy.needs (см. ниже): пока quality-check не зелёный, деплоя не будет.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff jq pip-audit
          pip install -r requirements.txt

      - name: Lint code
        run: ruff check . --fix

      - name: Run pip-audit
        # CVE-2026-3219 — уязвимость в самом pip (26.0.1), не в наших зависимостях.
        # На рантайм деплоя не влияет: pip используется только при build образа,
        # после установки пакетов он не вызывается. Игнорируем до выхода фикса.
        #
        # PYSEC-2025-183 (PyJWT 2.12.1) и PYSEC-2025-185 (python-jose 3.5.0) —
        # обе библиотеки уже на latest-версиях, исправления в PyPI пока нет
        # (проверено 2026-05-20). Пакеты используются для JWT-аутентификации:
        # хранение SECRET_KEY на проде сильное, ALGORITHM=HS256 (без RS/PS),
        # подделать токен извне без SECRET_KEY невозможно. Игнорируем до
        # выхода фикс-версии; следить через task #12 (миграция на pyjwt
        # или authlib после публикации патча).
        #
        # MAL-2026-4750 (fastapi 0.136.3, опубликовано 2026-05-25):
        # запись из osv.dev/malicious-packages-db. Префикс MAL обычно
        # маркирует typosquat-пакеты или supply-chain атаки. Для официального
        # fastapi на PyPI (источник установки — pinned в requirements.txt
        # через PyPI) это false-positive. Подтверждается несколькими
        # GitHub-issues в jpadilla/fastapi и tiangolo/fastapi от той же
        # даты. Игнорируем до удаления записи из osv.dev.
        run: |
          pip-audit \
            --ignore-vuln CVE-2024-23342 \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2026-3219 \
            --ignore-vuln PYSEC-2025-183 \
            --ignore-vuln PYSEC-2025-185 \
            --ignore-vuln MAL-2026-4750

      - name: Cache Trivy database
        uses: actions/cache@v5
        with:
          path: ~/.cache/trivy
          key: trivy-db

      - name: Run Trivy filesystem scan
        run: |
          mkdir -p .trivy-cache

          docker run --rm \
            -u $(id -u):$(id -g) \
            -e TRIVY_CACHE_DIR=/tmp/trivy-cache \
            -e XDG_CACHE_HOME=/tmp \
            -v $PWD:/app \
            -v $PWD/.trivy-cache:/tmp/trivy-cache \
            aquasec/trivy:0.50.1 fs /app \
            --format json \
            --output /app/trivy-report.json \
            --severity HIGH,CRITICAL

      - name: Fail on critical vulnerabilities
        run: |
          if jq '.Results[].Vulnerabilities[]? | select(.Severity=="CRITICAL")' trivy-report.json | grep -q .; then
            echo "CRITICAL vulnerabilities found!"
            exit 1
          fi

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v $(pwd):/repo \
            zricethezav/gitleaks:latest \
            detect --source=/repo --exit-code 1

      - name: Validate nginx config (gate деплоя)
        # deploy.needs включает quality-check → битый nginx-конфиг НЕ доедет до
        # прода (раньше deploy force-recreate'ил nginx без проверки → риск
        # уронить сайт).
        # nginx -t РЕЗОЛВИТ хосты upstream-блоков на старте → в изоляции падает
        # «host not found in upstream web_jkh». Подсовываем заглушку через
        # --add-host (nginx читает /etc/hosts) — резолв проходит, тест парсит
        # ВЕСЬ конфиг (синтаксис, заголовки, location). Список = upstream'ы из
        # default.conf (jkh_backend→web_jkh, arsenal_gsm_backend→web_arsenal_gsm).
        run: |
          docker run --rm \
            --add-host web_jkh:127.0.0.1 \
            --add-host web_arsenal_gsm:127.0.0.1 \
            -v "$PWD/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro" \
            nginx:alpine nginx -t

# ==========================================
# ===== SONARQUBE (параллельно, НЕ блокирует деплой) =====
# ==========================================
  sonarqube:
    name: SonarQube Scan (non-blocking)
    # Только отправляет код на сервер SonarQube для анализа — деплою НЕ нужна.
    # Отдельная джоба без needs → идёт ПАРАЛЛЕЛЬНО проверкам/билду; deploy её НЕ
    # ждёт (нет в deploy.needs), а провал не валит прогон (continue-on-error).
    # Раньше ~2 мин висела внутри quality-check на критическом пути. (2026-06-02)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=utility-calc
            -Dsonar.projectName="Utility Calculator & Arsenal"
            -Dsonar.python.version=3.13
            -Dsonar.sources=app,static,templates
            -Dsonar.exclusions=alembic/**,alembic_arsenal/**,app/tests/**,static/generated_files/**

# ==========================================
# ===== OWASP ZAP DAST (параллельно, НЕ блокирует деплой) =====
# ==========================================
  zap:
    name: OWASP ZAP DAST (non-blocking)
    # DAST в синергии с SonarQube (SAST): Sonar смотрит КОД, ZAP атакует
    # ЗАПУЩЕННОЕ приложение по HTTP. Поднимаем эфемерный прод-подобный стек
    # (через nginx, ENVIRONMENT=production) и гоняем passive baseline-скан —
    # без атакующих payload'ов (заголовки, CSP, флаги cookie, утечки, версии).
    #
    # По образцу sonarqube: continue-on-error + НЕ в deploy.needs → идёт
    # параллельно, провал/находки НЕ валят деплой. needs: build — нужен свежий
    # образ из GHCR. НИКОГДА не сканирует прод (asy-tk.ru) — только одноразовый
    # стенд в CI с throwaway-секретами и без прод-данных.
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      packages: read           # pull образа из GHCR
      security-events: write   # upload SARIF в Security tab (публичный репо → бесплатно)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate throwaway .env (БЕЗ прод-секретов)
        # ENVIRONMENT=production → тестируем РЕАЛЬНУЮ прод-постуру (strict CSP,
        # docs off, security-заголовки). Случайные секреты, DB_PASS≠postgres,
        # ENCRYPTION_KEY≠дефолт, SKIP_S3_DEFAULT_CHECK=1 — иначе config.py не
        # стартует в production. .env гитигнорится — на чистом checkout нет
        # .env.local (иначе config.py упал бы по защите prod-режима).
        run: |
          SECRET=$(openssl rand -hex 32)
          ENCKEY=$(python3 -c "import base64,os;print(base64.urlsafe_b64encode(os.urandom(32)).decode())")
          DBPW=$(openssl rand -hex 16)
          cat > .env <<EOF
          ENVIRONMENT=production
          POSTGRES_USER=zapci
          POSTGRES_PASSWORD=${DBPW}
          POSTGRES_DB=utility_db
          DB_USER=zapci
          DB_PASS=${DBPW}
          DB_HOST=pgbouncer
          DB_PORT=5432
          DB_NAME=utility_db
          ARSENAL_DB_NAME=arsenal_db
          SECRET_KEY=${SECRET}
          ENCRYPTION_KEY=${ENCKEY}
          SKIP_S3_DEFAULT_CHECK=1
          USE_PGBOUNCER=true
          EOF
          echo "throwaway .env создан (ENVIRONMENT=production, без прод-данных)"

      - name: Bring up ephemeral stack (через nginx)
        # Проект -p zapscan → docker-сеть zapscan_utility_net (нужна ZAP-шагу).
        # Поднимаем только HTTP-ярус (без workers/beat/backup). migration_job
        # отрабатывает миграции и выходит; web_jkh ждёт его completed.
        run: |
          docker compose -p zapscan pull --quiet migration_job web_jkh web_arsenal_gsm nginx pgbouncer || true
          docker compose -p zapscan up -d db pgbouncer redis minio migration_job web_jkh web_arsenal_gsm nginx
          echo "Ждём готовности приложения через nginx (http://localhost/health)…"
          ok=false
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health || true)
            if [ "$code" = "200" ]; then ok=true; echo "[health] готов на попытке $i"; break; fi
            sleep 5
          done
          if [ "$ok" != "true" ]; then
            echo "::warning::Приложение не поднялось — дамп статуса и логов"
            docker compose -p zapscan ps || true
            docker compose -p zapscan logs --tail 80 migration_job web_jkh nginx || true
            exit 1
          fi

      - name: Run ZAP baseline scan (passive, через nginx)
        # ZAP-контейнер цепляем в ту же docker-сеть и бьём по сервису nginx —
        # faithful: реальные заголовки/CSP/rate-limits прод-конфига. -a alpha
        # passive-правила, -m 5 минут на паука, -I не падать на warning
        # (всё равно || true — отчёт нужен в любом случае).
        run: |
          mkdir -p zap-work && chmod 777 zap-work
          docker run --rm --network zapscan_utility_net \
            -v "$PWD/zap-work:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://nginx \
              -J zap-report.json -r zap-report.html -w zap-report.md \
              -a -I -m 5 || true
          echo "ZAP-скан завершён."

      - name: Publish report to job summary
        if: always()
        run: |
          {
            echo "## OWASP ZAP DAST — passive baseline (через nginx, prod-режим)"
            echo ""
            if [ -f zap-work/zap-report.md ]; then
              cat zap-work/zap-report.md
            else
              echo "_Отчёт не сформирован — см. логи шага скана._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Convert ZAP JSON → SARIF
        if: always()
        run: |
          if [ -f zap-work/zap-report.json ]; then
            jq -f .github/zap/zap-to-sarif.jq zap-work/zap-report.json > zap.sarif \
              || echo '{"version":"2.1.0","runs":[]}' > zap.sarif
          else
            echo '{"version":"2.1.0","runs":[]}' > zap.sarif
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: zap.sarif
          category: owasp-zap-dast

      - name: Upload ZAP report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-dast-report
          path: zap-work/zap-report.*
          if-no-files-found: warn

      - name: Tear down stack
        if: always()
        run: docker compose -p zapscan down -v --remove-orphans || true

# ==========================================
# ===== BUILD ===============================
# ==========================================
  build:
    name: Build and Push Docker Image
    # ПАРАЛЛЕЛЬНО проверкам — needs убран (ускорение пайплайна, 2026-06-01).
    # ВНИМАНИЕ: образ соберётся и запушится в GHCR :latest даже если
    # quality/migration упадут, НО deploy его не возьмёт (deploy гейтит все
    # три). Следующий зелёный прогон перезапишет :latest.
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            latest
            type=sha

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          # Реестр-кэш в GHCR — надёжнее gha: нет лимита 10ГБ/7дн и вытеснения,
          # из-за которого слои apt/pip пересобирались с нуля каждый билд. gha
          # оставлен вторым источником на переходный период. Первый билд после
          # этого ещё холодный (наполняет :buildcache), дальше слои CACHED.
          cache-from: |
            type=registry,ref=ghcr.io/ylanov/utility-calc:buildcache
            type=gha
          cache-to: type=registry,ref=ghcr.io/ylanov/utility-calc:buildcache,mode=max

      - name: Scan Docker image with Trivy
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')

          mkdir -p .trivy-cache

          docker run --rm \
            -u $(id -u):$(id -g) \
            -e TRIVY_CACHE_DIR=/tmp/trivy-cache \
            -e XDG_CACHE_HOME=/tmp \
            -v $PWD/.trivy-cache:/tmp/trivy-cache \
            aquasec/trivy:0.50.1 image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --cache-dir /tmp/trivy-cache \
            ${IMAGE}:latest

# ==========================================
# ===== DEPLOY-PREP (параллельно проверкам) =
# ==========================================
  # Прогрев self-hosted раннера, ПОКА идут migration/quality/build (они на
  # ubuntu-latest — деплой-раннер всё это время простаивает). Делаем тут только
  # то, что НЕ зависит от нового образа: чистим диск под будущий pull. «Главное»
  # (pull собранного образа) остаётся в deploy и ждёт зелёного света от всех
  # проверок — раньше образа просто не существует.
  deploy-prep:
    name: Warm up deploy host
    runs-on: self-hosted
    steps:
      - name: Free disk space (conditional, never fails)
        run: |
          set +e
          USED=$(df / --output=pcent 2>/dev/null | tail -1 | tr -dc '0-9')
          echo "[disk] used ${USED:-?}%"
          if [ "${USED:-0}" -ge 85 ]; then
            echo "[disk] >=85% — чистим builder-кэш и dangling-образы"
            docker builder prune -af || true
            docker image prune -f || true
          else
            echo "[disk] места достаточно — prune пропущен"
          fi
          df -h / | tail -1
          exit 0

# ==========================================
# ===== DEPLOY ==============================
# ==========================================
  deploy:
    name: Deploy to Production
    # Ждёт ВСЕ три проверки + прогрев хоста. Проверки параллельны на трёх
    # ubuntu-раннерах; deploy-prep — на self-hosted, пока они идут. Время ≈
    # max(проверки) + deploy-без-prune. На pull образа deploy «останавливается и
    # ждёт» — раньше билда образа не существует. deploy-prep всегда exit 0,
    # поэтому не блокирует деплой даже если чистка чем-то не задалась.
    needs: [migration-check, quality-check, build, deploy-prep]
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Prepare project directory
        run: |
          sudo mkdir -p /opt/utility_calc/
          sudo chown -R $USER:$USER /opt/utility_calc/ || true

      - name: Sync project files
        run: |
          rsync -av \
            --delete \
            --exclude backups \
            --exclude .env \
            --exclude /opt/security \
            ./ /opt/utility_calc/

      - name: Create environment file
        working-directory: /opt/utility_calc
        run: echo "${{ secrets.PROD_ENV_FILE }}" > .env

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      # Чистка диска под pull перенесена в job deploy-prep (идёт ПАРАЛЛЕЛЬНО
      # проверкам, пока этот раннер простаивает). Причина prune — инцидент
      # 31.05.2026: при диске 93% pull/recreate упирался в место. Теперь это
      # сделано заранее и условно (только при >85%), здесь сразу тянем образ.
      - name: Pull latest images
        working-directory: /opt/utility_calc
        # GHCR периодически отвечает 502 Bad Gateway на manifest GET для
        # свежезалитого образа (catalog ещё не пропагировался по всем
        # nodes). docker compose pull в этот момент валит весь deploy.
        # Простой retry-loop с прогрессивной задержкой устраняет 95%
        # таких флапов без правки кода (наблюдалось 28.05.2026).
        run: |
          set -e
          for attempt in 1 2 3 4 5; do
            if docker compose pull; then
              echo "[pull] OK on attempt $attempt"
              exit 0
            fi
            sleep_for=$((attempt * 15))
            echo "[pull] attempt $attempt failed; sleeping ${sleep_for}s before retry"
            sleep $sleep_for
          done
          echo "[pull] all 5 attempts failed — registry likely down"
          exit 1

      - name: Start containers
        working-directory: /opt/utility_calc
        run: docker compose up -d --remove-orphans

      # Bug AJ: nginx serving static с bind-mount /opt/utility_calc/static.
      # Раньше полагались на rsync ./ /opt/utility_calc/ — но иногда runner
      # докатывал не все файлы (race с .git? --delete?). Теперь после старта
      # web-контейнера явно копируем актуальную static-копию из его файловой
      # системы поверх host-bind. Это гарантия что nginx отдаст ровно те JS/CSS,
      # которые собрались в этот же docker image.
      - name: Sync static from web container to host bind-mount
        working-directory: /opt/utility_calc
        run: |
          echo "Waiting for web container to be ready..."
          sleep 5
          docker cp utility_calc_web_jkh:/app/static/. /opt/utility_calc/static/
          echo "Static sync done."

      # 🔥 КЛЮЧЕВОЙ ФИКС (против 502): при пересоздании web_jkh получает НОВЫЙ IP в
      # docker-сети, а nginx держит старый (upstream `server web_jkh` резолвится на
      # старте/релоаде) → 502, пока не перерезолвит. РАНЬШЕ чинили тяжёлым
      # force-recreate контейнера + слепым sleep 15 (~2 мин на шаг). Теперь легко:
      #   1) ждём ГОТОВНОСТИ бэкенда опросом (а не вслепую) — чтобы nginx переключился
      #      сразу на живой backend;
      #   2) ПЕРЕСОЗДАЁМ nginx (а не `nginx -s reload`). Причина (инцидент
      #      08.06.2026, фикс 404 не подхватился): конфиг примонтирован как ОДИН
      #      файл (./nginx/conf.d/default.conf). rsync заменяет его новым inode,
      #      а `nginx -s reload` внутри контейнера читает СТАРЫЙ inode (bind-mount
      #      одного файла привязан к inode на старте контейнера) → правки конфига
      #      НЕ применяются, reload «успешен» со старым конфигом, фолбэк не
      #      срабатывает. Recreate перепривязывает свежий файл И перерезолвит
      #      upstream web_jkh (фикс 502). ~1-2с. Статика (./static) монтируется
      #      директорией, поэтому она и так обновляется — пересоздание для неё не
      #      требуется, но nginx всё равно увидит новые файлы.
      - name: Recreate nginx after backend ready
        working-directory: /opt/utility_calc
        run: |
          echo "Ждём готовности бэкенда web_jkh…"
          for i in $(seq 1 45); do
            if docker exec utility_calc_web_jkh python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" >/dev/null 2>&1; then
              echo "[backend] готов на попытке $i"
              break
            fi
            sleep 2
          done
          docker exec utility_nginx find /var/cache/nginx -type f -delete 2>/dev/null || true
          docker compose up -d --force-recreate --no-deps nginx || {
            docker rm -f utility_nginx || true
            docker compose up -d --no-deps nginx
          }
          echo "[nginx] пересоздан (свежий конфиг + перерезолв upstream)"

      - name: Health check
        working-directory: /opt/utility_calc
        run: |
          ATTEMPTS=10
          SUCCESS=false

          for i in $(seq 1 $ATTEMPTS); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health || true)

            if [ "$STATUS" = "200" ]; then
              SUCCESS=true
              echo "Service is healthy!"
              break
            fi

            echo "Health check attempt $i failed (status code: $STATUS)"
            sleep 3
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "Deployment failed!"

            docker compose logs --tail 100 web_jkh || true
            # Сервис web_arsenal_gsm теперь обслуживает только Arsenal
            # (модуль GSM удалён в apr 2026), но имя контейнера сохранено.
            docker compose logs --tail 100 web_arsenal_gsm || true
            docker compose logs --tail 100 nginx || true

            exit 1
          fi

      - name: Cleanup Docker resources
        run: |
          docker image prune -af
          docker container prune -f