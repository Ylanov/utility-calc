# ZAP baseline tuning (zap-baseline.py -c baseline.conf).
# Формат (TAB-разделители): <ruleid>	<WARN|IGNORE|FAIL>	(коммент)
# IGNORE — убрать из отчёта НЕустранимый/шумовой сигнал. Остальное — WARN.
90005	IGNORE	(Sec-Fetch-* — это request-заголовки браузера, серверно не чинятся)
10109	IGNORE	(Modern Web Application — чисто информационный маркер)
10049	IGNORE	(Storable/Cacheable Content — информационный, кэш настроен осознанно)
10027	IGNORE	(Suspicious Comments — русские dev-комментарии (ADMIN/USER/BUG/TODO), без секретов/кред/путей; вычистка = отдельный build-степ)
# 10038 (CSP style-src unsafe-inline, MEDIUM) НЕ глушим — оставляем видимым WARN:
# реальный (низкий) пункт. Фикс = убрать инлайн-стили из SPA (большой рефактор),
# риск только косметический CSS-injection (script-src уже без unsafe-inline).
# 90004 (COEP Header Missing) закрыт по-настоящему: nginx теперь шлёт require-corp.
