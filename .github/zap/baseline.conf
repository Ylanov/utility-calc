# ZAP baseline tuning (zap-baseline.py -c baseline.conf).
# Формат (TAB-разделители): <ruleid>	<WARN|IGNORE|FAIL>	(коммент)
# IGNORE — убрать из отчёта НЕустранимый/шумовой сигнал. Остальное — WARN.
90005	IGNORE	(Sec-Fetch-* — это request-заголовки браузера, серверно не чинятся)
10109	IGNORE	(Modern Web Application — чисто информационный маркер)
10049	IGNORE	(Storable/Cacheable Content — информационный, кэш настроен осознанно)
