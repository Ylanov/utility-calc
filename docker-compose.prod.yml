x-app-base: &app-base
  image: ghcr.io/Ylanov/utility-calc:latest
  restart: always
  env_file: ./.env
  environment:
    - DB_HOST=pgbouncer
    - DB_PORT=5432
  depends_on:
    db:
      condition: service_healthy
    pgbouncer:
      condition: service_started
    redis:
      condition: service_started
    minio:
      condition: service_started
  networks:
    - utility_net

services:
  # =========================================================================
  # Init-контейнер: прогоняет миграции и посев данных ДО старта web-воркеров.
  # Раньше миграции выполнялись внутри web.command — 4 воркера стартовали
  # параллельно и блокировали друг друга на alembic-lock (downtime 30+ сек).
  # Теперь web дожидается завершения этого контейнера (service_completed_successfully).
  # =========================================================================
  migrate:
    image: ghcr.io/Ylanov/utility-calc:latest
    container_name: utility_calc_migrate
    restart: "no"
    env_file: ./.env
    environment:
      - DB_HOST=pgbouncer
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    networks:
      - utility_net
    command: >
      sh -c "
      echo '---> Running Utility DB migrations...' && alembic upgrade head &&
      echo '---> Running Arsenal/GSM DB migrations...' && alembic -c alembic_arsenal.ini upgrade head &&
      echo '---> Seeding initial data...' && python -m app.core.initial_data &&
      echo '---> Migrations complete'
      "

  web:
    <<: *app-base
    container_name: utility_calc_web
    volumes:
      - shared_data:/app/static/generated_files
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    # Gunicorn/Uvicorn конфигурация для 5-10к пользователей:
    # -w: количество воркеров. По умолчанию 16 (cpu_count × 2 + 1 для 8 ядер);
    #     можно переопределить через WEB_CONCURRENCY=N в .env.
    # --timeout 120: дольше default-30s, чтобы PDF/Excel генерация успела.
    # --graceful-timeout 60: даём активным запросам минуту на завершение при SIGTERM.
    # --max-requests 10000 + jitter: периодический рестарт воркеров — лечит утечки памяти.
    # --keep-alive 15: переиспользование TCP — меньше CPU на handshake.
    command: >
      sh -c "
      echo '---> Starting Gunicorn (workers=$${WEB_CONCURRENCY:-16})...' &&
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w $${WEB_CONCURRENCY:-16}
      -b 0.0.0.0:8000
      --timeout 120
      --graceful-timeout 60
      --max-requests 10000
      --max-requests-jitter 1000
      --keep-alive 15
      --access-logfile -
      --error-logfile -
      "
    # Healthcheck использует python вместо curl (curl не установлен в slim-образе).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/health',timeout=3); sys.exit(0 if r.status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  worker_default:
    <<: *app-base
    container_name: utility_calc_worker_default
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    command: >
      celery -A app.worker worker
      --loglevel=info
      --queues=default
      --hostname=default@%h
      --concurrency=$${CELERY_WORKER_CONCURRENCY:-4}
      --max-tasks-per-child=500
      --time-limit=300
      --soft-time-limit=240
    deploy:
      resources:
        limits:
          memory: 2G

  worker_heavy:
    <<: *app-base
    container_name: utility_calc_worker_heavy
    volumes:
      - shared_data:/app/static/generated_files
    depends_on:
      db:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
      migrate:
        condition: service_completed_successfully
    command: >
      celery -A app.worker worker
      --loglevel=info
      --queues=heavy
      --hostname=heavy@%h
      --concurrency=2
      --max-tasks-per-child=100
      --time-limit=1800
      --soft-time-limit=1500
    deploy:
      resources:
        limits:
          memory: 3G

  watchtower:
    image: containrrr/watchtower
    container_name: utility_calc_watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config.json:ro
    command: --interval 300 --cleanup
    networks:
      - utility_net

  minio:
    image: minio/minio:latest
    container_name: utility_calc_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: $${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: $${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - utility_net
    deploy:
      resources:
        limits:
          memory: 1G

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: utility_calc_pgbouncer
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=$${POSTGRES_USER}
      - DB_PASSWORD=$${POSTGRES_PASSWORD}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=2000
      - DEFAULT_POOL_SIZE=40
      - RESERVE_POOL_SIZE=10
      - ADMIN_USERS=$${POSTGRES_USER}
      - AUTH_TYPE=plain
      - AUTH_USER=$${POSTGRES_USER}
      - AUTH_FILE=/etc/pgbouncer/userlist.txt
    depends_on:
      - db
    networks:
      - utility_net
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:15-alpine
    container_name: utility_calc_db
    restart: always
    environment:
      POSTGRES_USER: $${POSTGRES_USER}
      POSTGRES_PASSWORD: $${POSTGRES_PASSWORD}
      POSTGRES_DB: $${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sh:/docker-entrypoint-initdb.d/init_db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - utility_net
    deploy:
      resources:
        limits:
          memory: 4G

  redis:
    image: redis:7-alpine
    container_name: utility_calc_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - utility_net
    deploy:
      resources:
        limits:
          memory: 768M

  nginx:
    # ИСПОЛЬЗУЕМ ВАШ ЖЕ ОБРАЗ (он содержит папку static из Dockerfile)
    image: ghcr.io/Ylanov/utility-calc:latest
    container_name: utility_calc_nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      # Пробрасываем конфиг с хоста
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Пробрасываем статику с хоста (предполагается, что на сервере папка static есть)
      - ./static:/usr/share/nginx/html/static
      - shared_data:/usr/share/nginx/html/static/generated_files
    depends_on:
      web:
        condition: service_healthy
    networks:
      - utility_net
    deploy:
      resources:
        limits:
          memory: 256M

  backup:
    image: postgres:15-alpine
    container_name: utility_calc_backup
    restart: always
    environment:
      PGHOST: db
      PGUSER: $${POSTGRES_USER}
      PGPASSWORD: $${POSTGRES_PASSWORD}
      PGDB: $${POSTGRES_DB}
    volumes:
      - ./backups:/backups
      - ./backup.sh:/usr/local/bin/backup.sh
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "
      chmod +x /usr/local/bin/backup.sh &&
      while true; do /usr/local/bin/backup.sh; sleep 86400; done
      "
    networks:
      - utility_net

volumes:
  postgres_data:
  redis_data:
  shared_data:
  minio_data:

networks:
  utility_net:
    driver: bridge
